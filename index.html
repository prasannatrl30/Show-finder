<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Show Finder</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    [hidden] { display: none !important; }

    :root {
      --bg: #0e0c0a;
      --surface: #181410;
      --surface2: #211d18;
      --border: #2d2620;
      --border-light: #3d3328;
      --accent: #d4903a;
      --accent-dim: rgba(212, 144, 58, 0.12);
      --accent-glow: rgba(212, 144, 58, 0.2);
      --text: #f0ece6;
      --text-dim: #c4b8a8;
      --muted: #7a6e62;
      --muted-light: #9a8e80;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Inter', system-ui, -apple-system, sans-serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    body::before {
      content: '';
      position: fixed;
      top: -20vh; left: 50%;
      transform: translateX(-50%);
      width: 80vw; height: 60vh;
      background: radial-gradient(ellipse, rgba(212, 144, 58, 0.06) 0%, transparent 70%);
      pointer-events: none;
      z-index: 0;
    }

    .page-inner {
      position: relative;
      z-index: 1;
      width: 100%;
      max-width: 1020px;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 5rem 1.5rem 6rem;
    }

    /* ─── SEARCH FULL ─── */
    #searchFull {
      width: 100%;
      display: flex;
      flex-direction: column;
      align-items: center;
      transition: opacity 0.28s ease, transform 0.28s ease;
    }
    #searchFull.fading-out {
      opacity: 0; transform: translateY(-10px); pointer-events: none;
    }
    @keyframes fadeInDown {
      from { opacity: 0; transform: translateY(-10px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    #searchFull.fading-in { animation: fadeInDown 0.32s ease both; }

    header {
      text-align: center;
      max-width: 580px;
      margin-bottom: 2rem;
    }

    .badge {
      display: inline-flex;
      align-items: center;
      gap: 0.4rem;
      font-size: 0.72rem;
      font-weight: 600;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--accent);
      border: 1px solid rgba(212, 144, 58, 0.3);
      background: var(--accent-dim);
      border-radius: 100px;
      padding: 0.3rem 0.8rem;
      margin-bottom: 1.5rem;
    }
    .badge-dot { width: 5px; height: 5px; border-radius: 50%; background: var(--accent); }

    h1 {
      font-family: 'DM Serif Display', Georgia, serif;
      font-size: clamp(2.4rem, 6vw, 3.8rem);
      font-weight: 400;
      line-height: 1.1;
      color: var(--text);
      margin-bottom: 1.1rem;
    }
    h1 em { font-style: italic; color: var(--accent); }

    .subtitle {
      color: var(--muted-light);
      font-size: 1rem;
      line-height: 1.65;
      max-width: 440px;
      margin: 0 auto;
    }

    .divider { width: 40px; height: 1px; background: var(--border-light); margin: 1.5rem auto 0; }

    /* ─── MOOD CHIPS ─── */
    .mood-chips-wrap {
      width: 100%;
      max-width: 640px;
      margin-bottom: 0.85rem;
    }
    .mood-chips-label {
      font-size: 0.7rem;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.08em;
      font-weight: 500;
      margin-bottom: 0.55rem;
    }
    .mood-chips-row {
      display: flex;
      gap: 0.4rem;
      overflow-x: auto;
      scrollbar-width: none;
      padding-bottom: 0.1rem;
    }
    .mood-chips-row::-webkit-scrollbar { display: none; }

    .mood-chip {
      flex-shrink: 0;
      font-family: inherit;
      font-size: 0.8rem;
      font-weight: 500;
      padding: 0.38rem 0.9rem;
      border-radius: 100px;
      border: 1px solid rgba(212, 144, 58, 0.22);
      background: rgba(212, 144, 58, 0.06);
      color: var(--text-dim);
      cursor: pointer;
      transition: border-color 0.15s, color 0.15s, background 0.15s, transform 0.1s;
      white-space: nowrap;
    }
    .mood-chip:hover {
      border-color: var(--accent);
      color: var(--accent);
      background: var(--accent-dim);
    }
    .mood-chip:active { transform: scale(0.95); }

    /* ─── SEARCH CARD ─── */
    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 20px;
      width: 100%;
      max-width: 640px;
      overflow: hidden;
    }
    .card-body { padding: 1.8rem 2rem 1.2rem; }

    label {
      display: block;
      font-size: 0.8rem;
      font-weight: 500;
      color: var(--muted-light);
      margin-bottom: 0.75rem;
      letter-spacing: 0.04em;
      text-transform: uppercase;
    }

    /* Rotating placeholder */
    .input-wrap { position: relative; min-height: 100px; }

    textarea {
      width: 100%;
      min-height: 100px;
      background: transparent;
      border: none;
      color: var(--text);
      font-family: inherit;
      font-size: 1rem;
      line-height: 1.65;
      resize: none;
      outline: none;
      position: relative;
      z-index: 1;
    }
    /* Hide native placeholder — we use the overlay */
    textarea::placeholder { color: transparent; }

    .ph-overlay {
      position: absolute;
      top: 0; left: 0; right: 0;
      color: var(--muted);
      font-style: italic;
      font-size: 1rem;
      line-height: 1.65;
      pointer-events: none;
      transition: opacity 0.45s ease;
      z-index: 0;
    }
    .ph-overlay.fading { opacity: 0; }

    .card-footer {
      border-top: 1px solid var(--border);
      padding: 1rem 2rem;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 1rem;
    }
    .footer-hint { font-size: 0.8rem; color: var(--muted); }

    button[type="submit"] {
      flex-shrink: 0;
      padding: 0.65rem 1.4rem;
      background: var(--accent);
      color: #0e0c0a;
      font-family: inherit;
      font-size: 0.88rem;
      font-weight: 600;
      border: none;
      border-radius: 10px;
      cursor: pointer;
      transition: opacity 0.15s, transform 0.1s, box-shadow 0.15s;
      box-shadow: 0 2px 12px var(--accent-glow);
      display: flex;
      align-items: center;
      gap: 0.45rem;
    }
    button[type="submit"]:hover  { opacity: 0.9; box-shadow: 0 4px 20px var(--accent-glow); }
    button[type="submit"]:active { transform: scale(0.97); }
    button[type="submit"]:disabled { opacity: 0.4; cursor: not-allowed; transform: none; box-shadow: none; }
    .btn-arrow { font-size: 1.05em; line-height: 1; }

    /* ─── COMPACT BAR ─── */
    .compact-bar {
      width: 100%;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 0.8rem 1.2rem;
      display: flex;
      align-items: center;
      gap: 0.9rem;
      margin-bottom: 1.75rem;
      animation: slideDown 0.32s cubic-bezier(0.4, 0, 0.2, 1) both;
    }
    @keyframes slideDown {
      from { opacity: 0; transform: translateY(-8px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    .compact-query {
      flex: 1; min-width: 0;
      font-size: 0.9rem; color: var(--text-dim);
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    }
    .compact-edit-btn {
      flex-shrink: 0;
      background: none;
      border: 1px solid var(--border-light);
      color: var(--muted-light);
      font-family: inherit;
      font-size: 0.78rem;
      padding: 0.38rem 0.8rem;
      border-radius: 8px;
      cursor: pointer;
      transition: border-color 0.15s, color 0.15s;
    }
    .compact-edit-btn:hover { border-color: var(--accent); color: var(--accent); }

    /* ─── RESULTS ─── */
    #results { width: 100%; }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(8px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .results-toolbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 0.9rem;
      gap: 1rem;
    }
    .results-count {
      font-size: 0.88rem;
      color: var(--text-dim);
      font-weight: 400;
    }
    .results-count strong { color: var(--accent); font-weight: 600; }

    .toolbar-right { display: flex; align-items: center; gap: 0.4rem; }

    .view-btn {
      background: none;
      border: 1px solid var(--border);
      color: var(--muted);
      width: 34px; height: 34px;
      border-radius: 8px;
      cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      transition: border-color 0.15s, color 0.15s, background 0.15s;
    }
    .view-btn.active { border-color: var(--accent); color: var(--accent); background: var(--accent-dim); }
    .view-btn:hover:not(.active) { border-color: var(--border-light); color: var(--text-dim); }

    .filter-row {
      display: flex;
      gap: 0.45rem;
      overflow-x: auto;
      padding-bottom: 0.25rem;
      margin-bottom: 1.25rem;
      scrollbar-width: none;
    }
    .filter-row::-webkit-scrollbar { display: none; }

    .chip {
      flex-shrink: 0;
      font-family: inherit;
      font-size: 0.78rem;
      font-weight: 500;
      padding: 0.32rem 0.8rem;
      border-radius: 100px;
      border: 1px solid var(--border);
      background: none;
      color: var(--muted-light);
      cursor: pointer;
      transition: all 0.15s;
      white-space: nowrap;
    }
    .chip:hover { border-color: var(--border-light); color: var(--text); }
    .chip.active { background: var(--accent-dim); border-color: var(--accent); color: var(--accent); }

    /* ─── CARD POSTER ─── */
    .card-poster {
      position: relative;
      background: var(--surface2);
      overflow: hidden;
      flex-shrink: 0;
    }
    .card-poster img {
      position: absolute; inset: 0;
      width: 100%; height: 100%;
      object-fit: cover;
      z-index: 1;
    }
    .card-poster.no-img img { display: none; }
    .poster-placeholder {
      position: absolute; inset: 0;
      display: flex; align-items: center; justify-content: center;
      background: linear-gradient(160deg, var(--surface2) 0%, #1a1208 100%);
    }
    .ph-num {
      font-family: 'DM Serif Display', Georgia, serif;
      font-style: italic;
      color: var(--accent);
      opacity: 0.35;
    }

    .card-info { display: flex; flex-direction: column; gap: 0.28rem; flex: 1; }

    .card-meta-row {
      display: flex; align-items: center; justify-content: space-between; gap: 0.4rem;
    }

    .show-meta {
      font-size: 0.7rem;
      color: var(--accent);
      font-weight: 500;
      letter-spacing: 0.04em;
      text-transform: uppercase;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .imdb-badge {
      flex-shrink: 0;
      display: inline-flex;
      align-items: center;
      gap: 0.18rem;
      background: rgba(212, 144, 58, 0.12);
      border: 1px solid rgba(212, 144, 58, 0.22);
      color: var(--accent);
      font-size: 0.7rem;
      font-weight: 600;
      padding: 0.12rem 0.4rem;
      border-radius: 4px;
      white-space: nowrap;
    }

    .show-title { font-weight: 600; font-size: 0.92rem; color: var(--text); line-height: 1.3; }
    .show-year  { font-size: 0.72rem; color: var(--muted); }
    .show-reason { font-size: 0.82rem; color: var(--text-dim); line-height: 1.55; margin-top: 0.15rem; }

    /* ─── GRID VIEW ─── */
    .cards-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(175px, 1fr));
      gap: 1rem;
    }
    .cards-grid .show-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 14px;
      overflow: hidden;
      display: flex;
      flex-direction: column;
      transition: border-color 0.15s, transform 0.18s;
      animation: fadeUp 0.35s ease both;
    }
    .cards-grid .show-card:hover { border-color: var(--border-light); transform: translateY(-3px); }
    .cards-grid .show-card:nth-child(2) { animation-delay: 0.04s; }
    .cards-grid .show-card:nth-child(3) { animation-delay: 0.08s; }
    .cards-grid .show-card:nth-child(4) { animation-delay: 0.12s; }
    .cards-grid .show-card:nth-child(5) { animation-delay: 0.16s; }

    .cards-grid .card-poster { aspect-ratio: 2 / 3; width: 100%; }
    .cards-grid .ph-num { font-size: 2.4rem; }
    .cards-grid .card-info { padding: 0.85rem 0.95rem; }

    /* ─── LIST VIEW ─── */
    .cards-list {
      display: flex;
      flex-direction: column;
      border: 1px solid var(--border);
      border-radius: 16px;
      overflow: hidden;
      max-width: 680px;
      margin: 0 auto;
    }
    .cards-list .show-card {
      background: var(--surface);
      display: flex;
      flex-direction: row;
      border-bottom: 1px solid var(--border);
      transition: background 0.15s;
      animation: fadeUp 0.35s ease both;
    }
    .cards-list .show-card:last-child { border-bottom: none; }
    .cards-list .show-card:hover { background: var(--surface2); }
    .cards-list .show-card:nth-child(2) { animation-delay: 0.04s; }
    .cards-list .show-card:nth-child(3) { animation-delay: 0.08s; }
    .cards-list .show-card:nth-child(4) { animation-delay: 0.12s; }
    .cards-list .show-card:nth-child(5) { animation-delay: 0.16s; }

    .cards-list .card-poster { width: 88px; align-self: stretch; }
    .cards-list .ph-num { font-size: 1.6rem; }
    .cards-list .card-info { padding: 1rem 1.25rem; }

    /* ─── EMPTY STATE ─── */
    .empty-state {
      text-align: center;
      padding: 3rem 1rem 2rem;
      animation: fadeUp 0.4s ease both;
    }
    .empty-icon { font-size: 2rem; margin-bottom: 0.75rem; opacity: 0.5; }
    .empty-text {
      font-size: 0.95rem;
      color: var(--muted-light);
      line-height: 1.65;
      margin-bottom: 1.25rem;
    }
    .empty-chips {
      display: flex;
      gap: 0.4rem;
      justify-content: center;
      flex-wrap: wrap;
    }
    .empty-chip {
      font-family: inherit;
      font-size: 0.8rem;
      font-weight: 500;
      padding: 0.38rem 0.9rem;
      border-radius: 100px;
      border: 1px solid rgba(212, 144, 58, 0.22);
      background: rgba(212, 144, 58, 0.06);
      color: var(--text-dim);
      cursor: pointer;
      transition: border-color 0.15s, color 0.15s, background 0.15s;
      white-space: nowrap;
    }
    .empty-chip:hover { border-color: var(--accent); color: var(--accent); background: var(--accent-dim); }

    /* ─── SPINNER / ERROR ─── */
    .spinner {
      display: flex; align-items: center; justify-content: center;
      gap: 0.65rem; color: var(--muted-light); font-size: 0.9rem; padding: 3rem 0;
    }
    .spinner-ring {
      width: 18px; height: 18px;
      border: 2px solid var(--border-light);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      flex-shrink: 0;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    .error-msg {
      color: #e87171; font-size: 0.88rem; padding: 1rem 1.25rem;
      background: rgba(232, 113, 113, 0.06);
      border: 1px solid rgba(232, 113, 113, 0.18);
      border-radius: 12px;
      animation: fadeUp 0.3s ease;
    }
  </style>
</head>
<body>

  <div class="page-inner">

    <!-- Full search section -->
    <div id="searchFull">
      <header>
        <div class="badge"><span class="badge-dot"></span>AI-powered discovery</div>
        <h1>What do you feel<br>like <em>watching?</em></h1>
        <p class="subtitle">Describe your mood, the vibe you're after, or a story you're craving — and we'll find something perfect.</p>
        <div class="divider"></div>
      </header>

      <!-- Mood suggestion chips -->
      <div class="mood-chips-wrap">
        <div class="mood-chips-label">Try one of these</div>
        <div class="mood-chips-row" id="moodChipsRow">
          <button class="mood-chip" type="button">Something to cry to</button>
          <button class="mood-chip" type="button">Friday night energy</button>
          <button class="mood-chip" type="button">Impress a date</button>
          <button class="mood-chip" type="button">Tamil classics</button>
          <button class="mood-chip" type="button">Mind-bending sci-fi</button>
          <button class="mood-chip" type="button">Cozy Sunday</button>
          <button class="mood-chip" type="button">Late night alone</button>
          <button class="mood-chip" type="button">Feel good</button>
          <button class="mood-chip" type="button">Edge of your seat</button>
        </div>
      </div>

      <div class="card">
        <form id="moodForm">
          <div class="card-body">
            <label for="mood">Your mood or craving</label>
            <div class="input-wrap">
              <textarea id="mood" name="mood" required></textarea>
              <div class="ph-overlay" id="phOverlay"></div>
            </div>
          </div>
          <div class="card-footer">
            <span class="footer-hint">Enter to search &nbsp;·&nbsp; Shift+Enter for new line</span>
            <button type="submit" id="submitBtn">
              Find Shows <span class="btn-arrow">→</span>
            </button>
          </div>
        </form>
      </div>
    </div>

    <!-- Compact bar shown after search -->
    <div id="compactBar" class="compact-bar" hidden>
      <div id="compactQueryText" class="compact-query"></div>
      <button id="newSearchBtn" class="compact-edit-btn">Edit</button>
    </div>

    <!-- Results -->
    <section id="results" hidden></section>

  </div>

  <script>
    const form             = document.getElementById('moodForm');
    const resultsEl        = document.getElementById('results');
    const submitBtn        = document.getElementById('submitBtn');
    const searchFull       = document.getElementById('searchFull');
    const compactBar       = document.getElementById('compactBar');
    const compactQueryText = document.getElementById('compactQueryText');
    const newSearchBtn     = document.getElementById('newSearchBtn');
    const moodInput        = document.getElementById('mood');
    const phOverlay        = document.getElementById('phOverlay');

    let allShows    = [];
    let activeChip  = 'all';
    let currentView = 'grid';

    // ── Rotating placeholder ──
    const PLACEHOLDERS = [
      'I want something slow and unsettling…',
      'Friday night, something funny but not stupid',
      'A film that feels like rain',
      'Something my mum would love',
      'Tamil cinema that changed how I see the world',
      "A story I won't stop thinking about",
    ];
    let phIndex = 0;
    let phTimer = null;

    function cyclePlaceholder() {
      phOverlay.classList.add('fading');
      setTimeout(() => {
        phIndex = (phIndex + 1) % PLACEHOLDERS.length;
        phOverlay.textContent = PLACEHOLDERS[phIndex];
        phOverlay.classList.remove('fading');
      }, 450);
    }

    function startPlaceholder() {
      phOverlay.textContent = PLACEHOLDERS[phIndex];
      phOverlay.style.display = '';
      clearInterval(phTimer);
      phTimer = setInterval(cyclePlaceholder, 3000);
    }

    function stopPlaceholder() {
      clearInterval(phTimer);
      phTimer = null;
      phOverlay.style.display = 'none';
    }

    moodInput.addEventListener('input', () => {
      moodInput.value ? stopPlaceholder() : startPlaceholder();
    });

    // Start rotating on load
    startPlaceholder();

    // ── Enter key submits; Shift+Enter inserts newline ──
    moodInput.addEventListener('keydown', e => {
      if (e.key === 'Enter' && !e.shiftKey) {
        e.preventDefault();
        if (!submitBtn.disabled && moodInput.value.trim()) {
          form.dispatchEvent(new Event('submit', { bubbles: true, cancelable: true }));
        }
      }
    });

    // ── Mood chips (both suggestion row and empty-state chips) ──
    function submitMood(text) {
      moodInput.value = text;
      stopPlaceholder();
      // Small delay so the textarea visually updates first
      setTimeout(() => {
        form.dispatchEvent(new Event('submit', { bubbles: true, cancelable: true }));
      }, 60);
    }

    document.getElementById('moodChipsRow').addEventListener('click', e => {
      const chip = e.target.closest('.mood-chip');
      if (chip) submitMood(chip.textContent.trim());
    });

    // ── Collapse / expand ──
    function collapseSearch(moodText) {
      compactQueryText.textContent = moodText;
      searchFull.classList.add('fading-out');
      setTimeout(() => {
        searchFull.hidden = true;
        searchFull.classList.remove('fading-out');
        compactBar.hidden = false;
      }, 280);
    }

    function expandSearch() {
      compactBar.hidden = true;
      resultsEl.hidden = true;
      resultsEl.innerHTML = '';
      allShows = [];
      searchFull.hidden = false;
      searchFull.classList.add('fading-in');
      setTimeout(() => {
        searchFull.classList.remove('fading-in');
        moodInput.focus();
        if (!moodInput.value) startPlaceholder();
      }, 340);
    }

    newSearchBtn.addEventListener('click', expandSearch);

    // ── Form submit ──
    form.addEventListener('submit', async e => {
      e.preventDefault();
      const mood = moodInput.value.trim();
      if (!mood) return;

      submitBtn.disabled = true;
      submitBtn.innerHTML = 'Thinking… <span class="btn-arrow">→</span>';
      resultsEl.hidden = false;
      resultsEl.innerHTML = `
        <div class="spinner">
          <div class="spinner-ring"></div>
          Finding the right shows for your mood…
        </div>`;

      collapseSearch(mood);

      try {
        const res = await fetch('/api/recommend', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ mood }),
        });
        if (!res.ok) throw new Error(`Server error: ${res.status}`);

        const data = await res.json();
        allShows    = data.recommendations ?? data.shows ?? [];
        activeChip  = 'all';
        currentView = 'grid';
        renderResults();
      } catch (err) {
        resultsEl.innerHTML = `<div class="error-msg">Something went wrong: ${err.message}</div>`;
      } finally {
        submitBtn.disabled = false;
        submitBtn.innerHTML = 'Find Shows <span class="btn-arrow">→</span>';
      }
    });

    // ── Filters ──
    function buildChips(shows) {
      const genres = [...new Set(shows.map(s => s.genre).filter(Boolean))];
      const types  = [...new Set(shows.map(s => s.mediaType).filter(Boolean))];
      const chips  = ['all', ...genres];
      if (types.includes('movie') && types.includes('series')) chips.push('__movies', '__series');
      return chips;
    }

    function chipLabel(c) {
      if (c === 'all')      return 'All';
      if (c === '__movies') return 'Movies';
      if (c === '__series') return 'TV Shows';
      return c;
    }

    function filteredShows() {
      if (activeChip === 'all')      return allShows;
      if (activeChip === '__movies') return allShows.filter(s => s.mediaType === 'movie');
      if (activeChip === '__series') return allShows.filter(s => s.mediaType === 'series');
      return allShows.filter(s => s.genre === activeChip);
    }

    // ── Conversational count ──
    function countLabel(n) {
      if (n === 1) return 'Found <strong>1</strong> pick for you';
      return `Found <strong>${n}</strong> films for you`;
    }

    // ── Render ──
    function renderResults() {
      if (!allShows.length) {
        resultsEl.innerHTML = `
          <div class="empty-state">
            <div class="empty-icon">🎬</div>
            <p class="empty-text">Nothing matched — try describing a mood or feeling instead.</p>
            <div class="empty-chips">
              <button class="empty-chip">Feel good</button>
              <button class="empty-chip">Edge of your seat</button>
              <button class="empty-chip">Cozy Sunday</button>
            </div>
          </div>`;
        resultsEl.querySelector('.empty-chips').addEventListener('click', e => {
          const chip = e.target.closest('.empty-chip');
          if (chip) { expandSearch(); setTimeout(() => submitMood(chip.textContent.trim()), 400); }
        });
        return;
      }

      const chips = buildChips(allShows);
      const shown = filteredShows();

      resultsEl.innerHTML = `
        <div class="results-toolbar">
          <span class="results-count">${countLabel(shown.length)}</span>
          <div class="toolbar-right">
            <button class="view-btn ${currentView === 'list' ? 'active' : ''}" id="viewList" title="List view">
              <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round">
                <line x1="8" y1="6" x2="21" y2="6"/><line x1="8" y1="12" x2="21" y2="12"/><line x1="8" y1="18" x2="21" y2="18"/>
                <line x1="3" y1="6" x2="3.01" y2="6"/><line x1="3" y1="12" x2="3.01" y2="12"/><line x1="3" y1="18" x2="3.01" y2="18"/>
              </svg>
            </button>
            <button class="view-btn ${currentView === 'grid' ? 'active' : ''}" id="viewGrid" title="Grid view">
              <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round">
                <rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/>
                <rect x="14" y="14" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/>
              </svg>
            </button>
          </div>
        </div>

        ${chips.length > 1 ? `
        <div class="filter-row">
          ${chips.map(c => `
            <button class="chip ${c === activeChip ? 'active' : ''}" data-chip="${escAttr(c)}">
              ${escHtml(chipLabel(c))}
            </button>`).join('')}
        </div>` : ''}

        <div id="showContainer" class="${currentView === 'grid' ? 'cards-grid' : 'cards-list'}">
          ${shown.map((s, i) => renderCard(s, i)).join('')}
        </div>`;

      document.getElementById('viewList').addEventListener('click', () => { currentView = 'list'; renderResults(); });
      document.getElementById('viewGrid').addEventListener('click', () => { currentView = 'grid'; renderResults(); });
      document.querySelectorAll('.chip').forEach(btn =>
        btn.addEventListener('click', () => { activeChip = btn.dataset.chip; renderResults(); })
      );
    }

    function renderCard(s, i) {
      const hasPoster = !!s.poster;
      return `
        <div class="show-card">
          <div class="card-poster${hasPoster ? '' : ' no-img'}">
            <div class="poster-placeholder"><span class="ph-num">${i + 1}</span></div>
            ${hasPoster ? `<img src="${escAttr(s.poster)}" alt="${escAttr(s.title ?? '')}" loading="lazy" onerror="this.closest('.card-poster').classList.add('no-img')">` : ''}
          </div>
          <div class="card-info">
            <div class="card-meta-row">
              ${s.genre   ? `<span class="show-meta">${escHtml(s.genre)}</span>` : '<span></span>'}
              ${s.imdbRating ? `<span class="imdb-badge">★ ${escHtml(s.imdbRating)}</span>` : ''}
            </div>
            <span class="show-title">${escHtml(s.title ?? s.name ?? 'Untitled')}</span>
            ${s.year   ? `<span class="show-year">${escHtml(s.year)}</span>` : ''}
            ${s.reason ? `<p class="show-reason">${escHtml(s.reason)}</p>` : ''}
          </div>
        </div>`;
    }

    function escHtml(str) {
      return String(str).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
    }
    function escAttr(str) {
      return String(str).replace(/&/g,'&amp;').replace(/"/g,'&quot;').replace(/'/g,'&#39;');
    }
  </script>

  <script defer src="/_vercel/insights/script.js"></script>
</body>
</html>

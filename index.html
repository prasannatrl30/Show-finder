<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Watchpal — Find something worth watching</title>
  <meta name="description" content="Describe your mood and Watchpal finds the perfect film or show for you." />
  <meta property="og:title" content="Watchpal" />
  <meta property="og:description" content="AI-powered film and show recommendations based on your mood." />
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital@1&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    [hidden] { display: none !important; }

    :root {
      --bg:           #F7F5F1;
      --surface:      #EEEAE3;
      --surface-card: #FFFFFF;
      --border:       #E0DBD3;
      --border-light: #D0C9BF;
      --accent:       #C4622D;
      --accent-dim:   rgba(196, 98, 45, 0.08);
      --accent-hover: #A8501F;
      --text:         #1C1C1E;
      --text-dim:     #6B6B6B;
      --muted:        #9B9590;
      --star:         #D4A843;
      --shadow-sm:    0 1px 3px rgba(0,0,0,0.07), 0 1px 2px rgba(0,0,0,0.04);
      --shadow-md:    0 4px 12px rgba(0,0,0,0.08), 0 1px 3px rgba(0,0,0,0.05);
      --shadow-lg:    0 8px 24px rgba(0,0,0,0.10), 0 2px 6px rgba(0,0,0,0.05);
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Inter', system-ui, -apple-system, sans-serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      -webkit-font-smoothing: antialiased;
    }

    .page-inner {
      width: 100%;
      max-width: 1060px;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 3rem 1.5rem 7rem;
    }

    /* ─── WORDMARK ─── */
    .wordmark {
      align-self: flex-start;
      font-size: 1.05rem;
      font-weight: 700;
      color: var(--text);
      letter-spacing: -0.02em;
      margin-bottom: 4rem;
      display: flex;
      align-items: center;
      gap: 0.35rem;
    }
    .wordmark-dot {
      width: 6px; height: 6px;
      border-radius: 50%;
      background: var(--accent);
      display: inline-block;
    }

    /* ─── SEARCH FULL ─── */
    #searchFull {
      width: 100%;
      display: flex;
      flex-direction: column;
      align-items: center;
      transition: opacity 0.28s ease, transform 0.28s ease;
    }
    #searchFull.fading-out {
      opacity: 0; transform: translateY(-10px); pointer-events: none;
    }
    @keyframes fadeInDown {
      from { opacity: 0; transform: translateY(-10px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    #searchFull.fading-in { animation: fadeInDown 0.32s ease both; }

    /* ─── HEADER ─── */
    header {
      text-align: center;
      max-width: 600px;
      margin-bottom: 2.25rem;
    }

    .eyebrow {
      font-size: 0.72rem;
      font-weight: 600;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--accent);
      margin-bottom: 1.25rem;
    }

    h1 {
      font-family: 'Inter', system-ui, sans-serif;
      font-size: clamp(2.2rem, 5.5vw, 3.5rem);
      font-weight: 600;
      line-height: 1.12;
      color: var(--text);
      letter-spacing: -0.03em;
      margin-bottom: 1rem;
    }
    h1 .playfair {
      font-family: 'Playfair Display', Georgia, serif;
      font-style: italic;
      font-weight: 400;
      color: var(--accent);
      letter-spacing: -0.01em;
    }

    .subtitle {
      color: var(--text-dim);
      font-size: 1rem;
      line-height: 1.7;
      max-width: 400px;
      margin: 0 auto;
    }

    .divider {
      width: 36px; height: 2px;
      background: var(--accent);
      margin: 1.5rem auto 0;
      border-radius: 2px;
      opacity: 0.4;
    }

    /* ─── MOOD CHIPS ─── */
    .mood-chips-wrap {
      width: 100%;
      max-width: 640px;
      margin-bottom: 1rem;
    }
    .mood-chips-label {
      font-size: 0.7rem;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.08em;
      font-weight: 600;
      margin-bottom: 0.6rem;
    }
    .mood-chips-row {
      display: flex;
      gap: 0.4rem;
      overflow-x: auto;
      scrollbar-width: none;
      padding-bottom: 0.1rem;
    }
    .mood-chips-row::-webkit-scrollbar { display: none; }

    .mood-chip {
      flex-shrink: 0;
      font-family: inherit;
      font-size: 0.8rem;
      font-weight: 500;
      padding: 0.38rem 0.95rem;
      border-radius: 100px;
      border: 1px solid var(--border-light);
      background: var(--surface);
      color: var(--text);
      cursor: pointer;
      transition: border-color 0.15s, color 0.15s, background 0.15s, box-shadow 0.15s, transform 0.1s;
      white-space: nowrap;
    }
    .mood-chip:hover {
      border-color: var(--accent);
      color: var(--accent);
      background: var(--surface-card);
      box-shadow: var(--shadow-sm);
    }
    .mood-chip:active { transform: scale(0.96); }

    /* ─── SEARCH CARD ─── */
    .search-card {
      background: var(--surface-card);
      border: 1px solid var(--border);
      border-radius: 18px;
      width: 100%;
      max-width: 640px;
      overflow: hidden;
      box-shadow: var(--shadow-md);
    }
    .card-body { padding: 1.75rem 2rem 1.25rem; }

    label {
      display: block;
      font-size: 0.72rem;
      font-weight: 600;
      color: var(--muted);
      margin-bottom: 0.65rem;
      letter-spacing: 0.07em;
      text-transform: uppercase;
    }

    .input-wrap { position: relative; min-height: 96px; }

    textarea {
      width: 100%;
      min-height: 96px;
      background: transparent;
      border: none;
      color: var(--text);
      font-family: inherit;
      font-size: 1rem;
      line-height: 1.7;
      resize: none;
      outline: none;
      position: relative;
      z-index: 1;
    }
    textarea::placeholder { color: transparent; }

    .ph-overlay {
      position: absolute;
      top: 0; left: 0; right: 0;
      color: var(--muted);
      font-style: italic;
      font-size: 1rem;
      line-height: 1.7;
      pointer-events: none;
      transition: opacity 0.45s ease;
      z-index: 0;
    }
    .ph-overlay.fading { opacity: 0; }

    .card-footer {
      border-top: 1px solid var(--border);
      padding: 1rem 2rem;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 1rem;
    }
    .footer-hint { font-size: 0.78rem; color: var(--muted); }

    button[type="submit"] {
      flex-shrink: 0;
      padding: 0.65rem 1.5rem;
      background: var(--accent);
      color: #fff;
      font-family: inherit;
      font-size: 0.88rem;
      font-weight: 600;
      border: none;
      border-radius: 10px;
      cursor: pointer;
      transition: background 0.15s, transform 0.1s, box-shadow 0.15s;
      box-shadow: 0 2px 8px rgba(196, 98, 45, 0.3);
      display: flex;
      align-items: center;
      gap: 0.45rem;
    }
    button[type="submit"]:hover  { background: var(--accent-hover); box-shadow: 0 4px 16px rgba(196, 98, 45, 0.35); }
    button[type="submit"]:active { transform: scale(0.97); }
    button[type="submit"]:disabled { opacity: 0.45; cursor: not-allowed; transform: none; box-shadow: none; }
    .btn-arrow { font-size: 1.05em; line-height: 1; }

    /* ─── COMPACT BAR ─── */
    .compact-bar {
      width: 100%;
      background: var(--surface-card);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 0.75rem 1.25rem;
      display: flex;
      align-items: center;
      gap: 0.9rem;
      margin-bottom: 2rem;
      box-shadow: var(--shadow-sm);
      animation: slideDown 0.3s cubic-bezier(0.4, 0, 0.2, 1) both;
    }
    @keyframes slideDown {
      from { opacity: 0; transform: translateY(-6px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    .compact-query {
      flex: 1; min-width: 0;
      font-size: 0.88rem;
      color: var(--text-dim);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .compact-edit-btn {
      flex-shrink: 0;
      background: none;
      border: 1px solid var(--border-light);
      color: var(--text-dim);
      font-family: inherit;
      font-size: 0.75rem;
      font-weight: 500;
      padding: 0.3rem 0.8rem;
      border-radius: 7px;
      cursor: pointer;
      transition: border-color 0.15s, color 0.15s;
    }
    .compact-edit-btn:hover { border-color: var(--accent); color: var(--accent); }

    /* ─── RESULTS ─── */
    #results { width: 100%; }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(6px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .results-toolbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 1rem;
      gap: 1rem;
    }
    .results-count {
      font-size: 0.88rem;
      color: var(--text-dim);
      font-weight: 400;
    }
    .results-count strong { color: var(--accent); font-weight: 600; }

    .toolbar-right { display: flex; align-items: center; gap: 0.35rem; }

    .view-btn {
      background: var(--surface-card);
      border: 1px solid var(--border);
      color: var(--muted);
      width: 32px; height: 32px;
      border-radius: 8px;
      cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      transition: border-color 0.15s, color 0.15s, background 0.15s;
    }
    .view-btn.active { border-color: var(--accent); color: var(--accent); background: var(--accent-dim); }
    .view-btn:hover:not(.active) { border-color: var(--border-light); color: var(--text); }

    /* ─── FILTER CHIPS ─── */
    .filter-row {
      display: flex;
      gap: 0.4rem;
      overflow-x: auto;
      padding-bottom: 0.25rem;
      margin-bottom: 1.5rem;
      scrollbar-width: none;
    }
    .filter-row::-webkit-scrollbar { display: none; }

    .chip {
      flex-shrink: 0;
      font-family: inherit;
      font-size: 0.78rem;
      font-weight: 500;
      padding: 0.3rem 0.85rem;
      border-radius: 100px;
      border: 1px solid var(--border);
      background: var(--surface-card);
      color: var(--text-dim);
      cursor: pointer;
      transition: all 0.15s;
      white-space: nowrap;
    }
    .chip:hover { border-color: var(--border-light); color: var(--text); }
    .chip.active {
      background: var(--accent-dim);
      border-color: var(--accent);
      color: var(--accent);
    }

    /* ─── CARD POSTER ─── */
    .card-poster {
      position: relative;
      background: var(--surface);
      overflow: hidden;
      flex-shrink: 0;
    }
    .card-poster img {
      position: absolute; inset: 0;
      width: 100%; height: 100%;
      object-fit: cover;
      z-index: 1;
    }
    .card-poster.no-img img { display: none; }
    .poster-placeholder {
      position: absolute; inset: 0;
      display: flex; align-items: center; justify-content: center;
      background: linear-gradient(150deg, #EEEAE3 0%, #E4DDD3 100%);
    }
    .ph-num {
      font-family: 'Playfair Display', Georgia, serif;
      font-style: italic;
      color: var(--border-light);
      font-weight: 400;
    }

    /* Shared card info */
    .card-info { display: flex; flex-direction: column; gap: 0.25rem; flex: 1; }

    .card-meta-row {
      display: flex; align-items: center; justify-content: space-between; gap: 0.4rem;
    }

    .show-meta {
      font-size: 0.68rem;
      color: var(--accent);
      font-weight: 600;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .imdb-badge {
      flex-shrink: 0;
      display: inline-flex;
      align-items: center;
      gap: 0.2rem;
      background: rgba(212, 168, 67, 0.1);
      border: 1px solid rgba(212, 168, 67, 0.25);
      color: #A07820;
      font-size: 0.68rem;
      font-weight: 600;
      padding: 0.1rem 0.4rem;
      border-radius: 4px;
      white-space: nowrap;
    }

    .show-title { font-weight: 600; font-size: 0.9rem; color: var(--text); line-height: 1.35; }
    .show-year  { font-size: 0.72rem; color: var(--muted); font-weight: 400; }
    .show-reason { font-size: 0.8rem; color: var(--text-dim); line-height: 1.6; margin-top: 0.2rem; }

    /* ─── GRID VIEW ─── */
    .cards-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(170px, 1fr));
      gap: 1.1rem;
    }
    .cards-grid .show-card {
      background: var(--surface-card);
      border: 1px solid var(--border);
      border-radius: 14px;
      overflow: hidden;
      display: flex;
      flex-direction: column;
      transition: box-shadow 0.2s, transform 0.2s, border-color 0.2s;
      animation: fadeUp 0.35s ease both;
      box-shadow: var(--shadow-sm);
    }
    .cards-grid .show-card:hover {
      box-shadow: var(--shadow-lg);
      transform: translateY(-3px);
      border-color: var(--border-light);
    }
    .cards-grid .show-card:nth-child(2) { animation-delay: 0.04s; }
    .cards-grid .show-card:nth-child(3) { animation-delay: 0.08s; }
    .cards-grid .show-card:nth-child(4) { animation-delay: 0.12s; }
    .cards-grid .show-card:nth-child(5) { animation-delay: 0.16s; }

    .cards-grid .card-poster { aspect-ratio: 2 / 3; width: 100%; }
    .cards-grid .ph-num { font-size: 2.2rem; }
    .cards-grid .card-info { padding: 1rem; }

    /* ─── LIST VIEW ─── */
    .cards-list {
      display: flex;
      flex-direction: column;
      gap: 0.6rem;
      max-width: 700px;
      margin: 0 auto;
      width: 100%;
    }
    .cards-list .show-card {
      background: var(--surface-card);
      border: 1px solid var(--border);
      border-radius: 14px;
      display: flex;
      flex-direction: row;
      overflow: hidden;
      transition: box-shadow 0.2s, border-color 0.2s;
      animation: fadeUp 0.35s ease both;
      box-shadow: var(--shadow-sm);
    }
    .cards-list .show-card:hover {
      box-shadow: var(--shadow-md);
      border-color: var(--border-light);
    }
    .cards-list .show-card:nth-child(2) { animation-delay: 0.04s; }
    .cards-list .show-card:nth-child(3) { animation-delay: 0.08s; }
    .cards-list .show-card:nth-child(4) { animation-delay: 0.12s; }
    .cards-list .show-card:nth-child(5) { animation-delay: 0.16s; }

    .cards-list .card-poster { width: 80px; flex-shrink: 0; align-self: stretch; }
    .cards-list .ph-num { font-size: 1.4rem; }
    .cards-list .card-info { padding: 1rem 1.25rem; justify-content: center; }

    /* ─── EMPTY STATE ─── */
    .empty-state {
      text-align: center;
      padding: 3.5rem 1rem 2rem;
      animation: fadeUp 0.4s ease both;
    }
    .empty-icon { font-size: 2.2rem; margin-bottom: 0.85rem; }
    .empty-text {
      font-size: 0.95rem;
      color: var(--text-dim);
      line-height: 1.65;
      margin-bottom: 1.5rem;
    }
    .empty-chips {
      display: flex; gap: 0.4rem;
      justify-content: center;
      flex-wrap: wrap;
    }
    .empty-chip {
      font-family: inherit;
      font-size: 0.8rem;
      font-weight: 500;
      padding: 0.4rem 1rem;
      border-radius: 100px;
      border: 1px solid var(--border-light);
      background: var(--surface);
      color: var(--text);
      cursor: pointer;
      transition: border-color 0.15s, color 0.15s;
    }
    .empty-chip:hover { border-color: var(--accent); color: var(--accent); }

    /* ─── SPINNER / ERROR ─── */
    .spinner {
      display: flex; align-items: center; justify-content: center;
      gap: 0.65rem; color: var(--text-dim); font-size: 0.9rem; padding: 4rem 0;
    }
    .spinner-ring {
      width: 18px; height: 18px;
      border: 2px solid var(--border-light);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin 0.75s linear infinite;
      flex-shrink: 0;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    .error-msg {
      color: #C0392B;
      font-size: 0.88rem;
      padding: 1rem 1.25rem;
      background: rgba(192, 57, 43, 0.05);
      border: 1px solid rgba(192, 57, 43, 0.15);
      border-radius: 12px;
      animation: fadeUp 0.3s ease;
    }

    /* ─── WELCOME BACK ─── */
    .welcome-back {
      align-self: flex-start;
      font-size: 0.75rem;
      font-weight: 500;
      color: var(--muted);
      margin-bottom: 3.25rem;
      margin-top: -2.75rem;
      letter-spacing: 0.01em;
    }
    .welcome-back span {
      color: var(--accent);
      font-weight: 600;
    }

    /* ─── CHIPS HEADER ─── */
    .chips-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 0.55rem;
    }
    .clear-history-btn {
      font-family: inherit;
      font-size: 0.7rem;
      color: var(--muted);
      background: none;
      border: none;
      cursor: pointer;
      padding: 0;
      text-decoration: underline;
      text-underline-offset: 2px;
      transition: color 0.15s;
    }
    .clear-history-btn:hover { color: var(--accent); }
  </style>
</head>
<body>

  <div class="page-inner">

    <!-- Wordmark -->
    <div class="wordmark">
      <span class="wordmark-dot"></span>
      Watchpal
    </div>

    <!-- Return user greeting -->
    <div id="welcomeBack" class="welcome-back" hidden>
      Welcome back — <span>picks based on your history</span>
    </div>

    <!-- Full search section -->
    <div id="searchFull">
      <header>
        <p class="eyebrow">AI-powered discovery</p>
        <h1>What do you feel like<br><span class="playfair">watching?</span></h1>
        <p class="subtitle">Describe your mood, the vibe you're after, or a story you're craving.</p>
        <div class="divider"></div>
      </header>

      <div class="search-card">
        <form id="moodForm">
          <div class="card-body">
            <label for="mood">Your mood or craving</label>
            <div class="input-wrap">
              <textarea id="mood" name="mood" required></textarea>
              <div class="ph-overlay" id="phOverlay"></div>
            </div>
          </div>
          <div class="card-footer">
            <span class="footer-hint">Enter to search &nbsp;·&nbsp; Shift+Enter for new line</span>
            <button type="submit" id="submitBtn">
              Discover →
            </button>
          </div>
        </form>
      </div>

      <!-- Mood chips — below the input card (populated by JS) -->
      <div class="mood-chips-wrap" style="margin-top: 0.85rem; margin-bottom: 0;">
        <div class="chips-header">
          <div class="mood-chips-label" id="chipsLabel">Quick picks</div>
          <button class="clear-history-btn" id="clearHistoryBtn" hidden>Clear history</button>
        </div>
        <div class="mood-chips-row" id="moodChipsRow"></div>
      </div>
    </div>

    <!-- Compact bar shown after search -->
    <div id="compactBar" class="compact-bar" hidden>
      <div id="compactQueryText" class="compact-query"></div>
      <button id="newSearchBtn" class="compact-edit-btn">Edit</button>
    </div>

    <!-- Results -->
    <section id="results" hidden></section>

  </div>

  <script>
    const form             = document.getElementById('moodForm');
    const resultsEl        = document.getElementById('results');
    const submitBtn        = document.getElementById('submitBtn');
    const searchFull       = document.getElementById('searchFull');
    const compactBar       = document.getElementById('compactBar');
    const compactQueryText = document.getElementById('compactQueryText');
    const newSearchBtn     = document.getElementById('newSearchBtn');
    const moodInput        = document.getElementById('mood');
    const phOverlay        = document.getElementById('phOverlay');

    let allShows    = [];
    let activeChip  = 'all';
    let currentView = 'list';

    // ── localStorage history ──
    const HISTORY_KEY  = 'watchpal_history';
    const MAX_HISTORY  = 10;

    function getHistory() {
      try { return JSON.parse(localStorage.getItem(HISTORY_KEY) || '[]'); }
      catch { return []; }
    }

    function saveToHistory(query) {
      const history = getHistory().filter(h => h.query.toLowerCase() !== query.toLowerCase());
      history.unshift({ query, timestamp: Date.now() });
      localStorage.setItem(HISTORY_KEY, JSON.stringify(history.slice(0, MAX_HISTORY)));
    }

    function clearHistory() {
      localStorage.removeItem(HISTORY_KEY);
    }

    // ── Personalised chips ──
    const DEFAULT_CHIPS = [
      'Something to cry to', 'Friday night energy', 'Impress a date',
      'Tamil classics', 'Mind-bending sci-fi', 'Cozy Sunday',
      'Late night alone', 'Feel good', 'Edge of your seat',
    ];

    function renderChips() {
      const history    = getHistory();
      const chipsLabel = document.getElementById('chipsLabel');
      const chipsRow   = document.getElementById('moodChipsRow');
      const clearBtn   = document.getElementById('clearHistoryBtn');
      const welcomeEl  = document.getElementById('welcomeBack');

      if (history.length > 0) {
        chipsLabel.textContent = 'YOUR PICKS';
        clearBtn.hidden  = false;
        welcomeEl.hidden = false;
        const recent = history.slice(0, 5).map(h => h.query);
        chipsRow.innerHTML = recent
          .map(q => `<button class="mood-chip" type="button">${escHtml(q)}</button>`)
          .join('');
      } else {
        chipsLabel.textContent = 'QUICK PICKS';
        clearBtn.hidden  = true;
        welcomeEl.hidden = true;
        chipsRow.innerHTML = DEFAULT_CHIPS
          .map(c => `<button class="mood-chip" type="button">${c}</button>`)
          .join('');
      }

      chipsRow.onclick = e => {
        const chip = e.target.closest('.mood-chip');
        if (chip) submitMood(chip.textContent.trim());
      };
    }

    document.getElementById('clearHistoryBtn').addEventListener('click', () => {
      clearHistory();
      renderChips();
    });

    // Render chips on load
    renderChips();

    // ── Rotating placeholder ──
    const PLACEHOLDERS = [
      'I want something slow and unsettling…',
      'Friday night, something funny but not stupid',
      'A film that feels like rain',
      'Something my mum would love',
      'Tamil cinema that changed how I see the world',
      "A story I won't stop thinking about",
    ];
    let phIndex = 0;
    let phTimer = null;

    function cyclePlaceholder() {
      phOverlay.classList.add('fading');
      setTimeout(() => {
        phIndex = (phIndex + 1) % PLACEHOLDERS.length;
        phOverlay.textContent = PLACEHOLDERS[phIndex];
        phOverlay.classList.remove('fading');
      }, 450);
    }

    function startPlaceholder() {
      phOverlay.textContent = PLACEHOLDERS[phIndex];
      phOverlay.style.display = '';
      clearInterval(phTimer);
      phTimer = setInterval(cyclePlaceholder, 3000);
    }

    function stopPlaceholder() {
      clearInterval(phTimer);
      phTimer = null;
      phOverlay.style.display = 'none';
    }

    moodInput.addEventListener('input', () => {
      moodInput.value ? stopPlaceholder() : startPlaceholder();
    });

    startPlaceholder();

    // ── Enter submits; Shift+Enter = newline ──
    moodInput.addEventListener('keydown', e => {
      if (e.key === 'Enter' && !e.shiftKey) {
        e.preventDefault();
        if (!submitBtn.disabled && moodInput.value.trim()) {
          form.dispatchEvent(new Event('submit', { bubbles: true, cancelable: true }));
        }
      }
    });

    // ── Mood chips ──
    function submitMood(text) {
      moodInput.value = text;
      stopPlaceholder();
      setTimeout(() => {
        form.dispatchEvent(new Event('submit', { bubbles: true, cancelable: true }));
      }, 60);
    }

    // ── Collapse / expand ──
    function collapseSearch(moodText) {
      compactQueryText.textContent = moodText;
      searchFull.classList.add('fading-out');
      setTimeout(() => {
        searchFull.hidden = true;
        searchFull.classList.remove('fading-out');
        compactBar.hidden = false;
      }, 280);
    }

    function expandSearch() {
      compactBar.hidden = true;
      resultsEl.hidden = true;
      resultsEl.innerHTML = '';
      allShows = [];
      searchFull.hidden = false;
      searchFull.classList.add('fading-in');
      renderChips(); // refresh chips with latest history
      setTimeout(() => {
        searchFull.classList.remove('fading-in');
        moodInput.focus();
        if (!moodInput.value) startPlaceholder();
      }, 340);
    }

    newSearchBtn.addEventListener('click', expandSearch);

    // ── Form submit ──
    form.addEventListener('submit', async e => {
      e.preventDefault();
      const mood = moodInput.value.trim();
      if (!mood) return;

      submitBtn.disabled = true;
      submitBtn.innerHTML = 'Thinking… <span class="btn-arrow">→</span>';
      resultsEl.hidden = false;
      resultsEl.innerHTML = `
        <div class="spinner">
          <div class="spinner-ring"></div>
          Finding films &amp; shows for your mood…
        </div>`;

      saveToHistory(mood);
      collapseSearch(mood);

      try {
        const recentHistory = getHistory()
          .slice(1, 4)           // skip the one we just saved; take next 3
          .map(h => h.query);

        const res = await fetch('/api/recommend', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ mood, history: recentHistory }),
        });
        if (!res.ok) throw new Error(`Server error: ${res.status}`);

        const data = await res.json();
        allShows   = data.recommendations ?? data.shows ?? [];
        activeChip = 'all';
        currentView = 'list'; // always reset to list on new search
        renderResults();
      } catch (err) {
        resultsEl.innerHTML = `<div class="error-msg">Something went wrong: ${err.message}</div>`;
      } finally {
        submitBtn.disabled = false;
        submitBtn.innerHTML = 'Discover →';
      }
    });

    // ── Filters ──
    function buildChips(shows) {
      const genres = [...new Set(shows.map(s => s.genre).filter(Boolean))];
      const types  = [...new Set(shows.map(s => s.mediaType).filter(Boolean))];
      const chips  = ['all', ...genres];
      if (types.includes('movie') && types.includes('series')) chips.push('__movies', '__series');
      return chips;
    }

    function chipLabel(c) {
      if (c === 'all')      return 'All';
      if (c === '__movies') return 'Movies';
      if (c === '__series') return 'TV Shows';
      return c;
    }

    function filteredShows() {
      if (activeChip === 'all')      return allShows;
      if (activeChip === '__movies') return allShows.filter(s => s.mediaType === 'movie');
      if (activeChip === '__series') return allShows.filter(s => s.mediaType === 'series');
      return allShows.filter(s => s.genre === activeChip);
    }

    function countLabel(n) {
      if (n === 1) return 'Found <strong>1</strong> title for you';
      return `Found <strong>${n}</strong> films &amp; shows for you`;
    }

    // ── Render ──
    function renderResults() {
      if (!allShows.length) {
        resultsEl.innerHTML = `
          <div class="empty-state">
            <div class="empty-icon">🎬</div>
            <p class="empty-text">Nothing matched — try describing a mood or feeling instead.</p>
            <div class="empty-chips">
              <button class="empty-chip">Feel good</button>
              <button class="empty-chip">Edge of your seat</button>
              <button class="empty-chip">Cozy Sunday</button>
            </div>
          </div>`;
        resultsEl.querySelector('.empty-chips').addEventListener('click', e => {
          const chip = e.target.closest('.empty-chip');
          if (chip) { expandSearch(); setTimeout(() => submitMood(chip.textContent.trim()), 400); }
        });
        return;
      }

      const chips = buildChips(allShows);
      const shown = filteredShows();

      resultsEl.innerHTML = `
        <div class="results-toolbar">
          <span class="results-count">${countLabel(shown.length)}</span>
          <div class="toolbar-right">
            <button class="view-btn ${currentView === 'list' ? 'active' : ''}" id="viewList" title="List view">
              <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round">
                <line x1="8" y1="6" x2="21" y2="6"/><line x1="8" y1="12" x2="21" y2="12"/><line x1="8" y1="18" x2="21" y2="18"/>
                <line x1="3" y1="6" x2="3.01" y2="6"/><line x1="3" y1="12" x2="3.01" y2="12"/><line x1="3" y1="18" x2="3.01" y2="18"/>
              </svg>
            </button>
            <button class="view-btn ${currentView === 'grid' ? 'active' : ''}" id="viewGrid" title="Grid view">
              <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round">
                <rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/>
                <rect x="14" y="14" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/>
              </svg>
            </button>
          </div>
        </div>

        ${chips.length > 1 ? `
        <div class="filter-row">
          ${chips.map(c => `
            <button class="chip ${c === activeChip ? 'active' : ''}" data-chip="${escAttr(c)}">
              ${escHtml(chipLabel(c))}
            </button>`).join('')}
        </div>` : ''}

        <div id="showContainer" class="${currentView === 'grid' ? 'cards-grid' : 'cards-list'}">
          ${shown.map((s, i) => renderCard(s, i)).join('')}
        </div>`;

      document.getElementById('viewList').addEventListener('click', () => { currentView = 'list'; renderResults(); });
      document.getElementById('viewGrid').addEventListener('click', () => { currentView = 'grid'; renderResults(); });
      document.querySelectorAll('.chip').forEach(btn =>
        btn.addEventListener('click', () => { activeChip = btn.dataset.chip; renderResults(); })
      );
    }

    function renderCard(s, i) {
      const hasPoster = !!s.poster;
      return `
        <div class="show-card">
          <div class="card-poster${hasPoster ? '' : ' no-img'}">
            <div class="poster-placeholder"><span class="ph-num">${i + 1}</span></div>
            ${hasPoster ? `<img src="${escAttr(s.poster)}" alt="${escAttr(s.title ?? '')}" loading="lazy" onerror="this.closest('.card-poster').classList.add('no-img')">` : ''}
          </div>
          <div class="card-info">
            <div class="card-meta-row">
              ${s.genre      ? `<span class="show-meta">${escHtml(s.genre)}</span>`          : '<span></span>'}
              ${s.imdbRating ? `<span class="imdb-badge">★ ${escHtml(s.imdbRating)}</span>` : ''}
            </div>
            <span class="show-title">${escHtml(s.title ?? s.name ?? 'Untitled')}</span>
            ${s.year   ? `<span class="show-year">${escHtml(s.year)}</span>`   : ''}
            ${s.reason ? `<p class="show-reason">${escHtml(s.reason)}</p>`     : ''}
          </div>
        </div>`;
    }

    function escHtml(str) {
      return String(str).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
    }
    function escAttr(str) {
      return String(str).replace(/&/g,'&amp;').replace(/"/g,'&quot;').replace(/'/g,'&#39;');
    }
  </script>

  <script defer src="/_vercel/insights/script.js"></script>
</body>
</html>

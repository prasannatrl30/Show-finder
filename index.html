<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Show Finder</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0e0c0a;
      --surface: #181410;
      --surface2: #211d18;
      --border: #2d2620;
      --border-light: #3d3328;
      --accent: #d4903a;
      --accent-dim: rgba(212, 144, 58, 0.12);
      --accent-glow: rgba(212, 144, 58, 0.2);
      --text: #f0ece6;
      --text-dim: #c4b8a8;
      --muted: #7a6e62;
      --muted-light: #9a8e80;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Inter', system-ui, -apple-system, sans-serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    /* Ambient background glow */
    body::before {
      content: '';
      position: fixed;
      top: -20vh;
      left: 50%;
      transform: translateX(-50%);
      width: 80vw;
      height: 60vh;
      background: radial-gradient(ellipse, rgba(212, 144, 58, 0.06) 0%, transparent 70%);
      pointer-events: none;
      z-index: 0;
    }

    .page-inner {
      position: relative;
      z-index: 1;
      width: 100%;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 5rem 1.5rem 6rem;
    }

    /* Header */
    header {
      text-align: center;
      max-width: 580px;
      margin-bottom: 3.5rem;
    }

    .badge {
      display: inline-flex;
      align-items: center;
      gap: 0.4rem;
      font-size: 0.72rem;
      font-weight: 600;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--accent);
      border: 1px solid rgba(212, 144, 58, 0.3);
      background: var(--accent-dim);
      border-radius: 100px;
      padding: 0.3rem 0.8rem;
      margin-bottom: 1.5rem;
    }

    .badge-dot {
      width: 5px;
      height: 5px;
      border-radius: 50%;
      background: var(--accent);
    }

    h1 {
      font-family: 'DM Serif Display', Georgia, serif;
      font-size: clamp(2.4rem, 6vw, 3.8rem);
      font-weight: 400;
      line-height: 1.1;
      letter-spacing: -0.01em;
      color: var(--text);
      margin-bottom: 1.1rem;
    }

    h1 em {
      font-style: italic;
      color: var(--accent);
    }

    .subtitle {
      color: var(--muted-light);
      font-size: 1rem;
      line-height: 1.65;
      max-width: 440px;
      margin: 0 auto;
    }

    /* Divider */
    .divider {
      width: 40px;
      height: 1px;
      background: var(--border-light);
      margin: 1.5rem auto 0;
    }

    /* Form card */
    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 0;
      width: 100%;
      max-width: 640px;
      overflow: hidden;
    }

    .card-body {
      padding: 1.8rem 2rem;
    }

    label {
      display: block;
      font-size: 0.8rem;
      font-weight: 500;
      color: var(--muted-light);
      margin-bottom: 0.75rem;
      letter-spacing: 0.04em;
      text-transform: uppercase;
    }

    textarea {
      width: 100%;
      min-height: 120px;
      background: transparent;
      border: none;
      color: var(--text);
      font-family: inherit;
      font-size: 1rem;
      line-height: 1.65;
      resize: none;
      outline: none;
    }

    textarea::placeholder {
      color: var(--muted);
      font-style: italic;
    }

    .card-footer {
      border-top: 1px solid var(--border);
      padding: 1rem 2rem;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 1rem;
    }

    .footer-hint {
      font-size: 0.8rem;
      color: var(--muted);
    }

    button[type="submit"] {
      flex-shrink: 0;
      padding: 0.65rem 1.4rem;
      background: var(--accent);
      color: #0e0c0a;
      font-family: inherit;
      font-size: 0.88rem;
      font-weight: 600;
      border: none;
      border-radius: 10px;
      cursor: pointer;
      letter-spacing: 0.01em;
      transition: opacity 0.15s, transform 0.1s, box-shadow 0.15s;
      box-shadow: 0 2px 12px var(--accent-glow);
      display: flex;
      align-items: center;
      gap: 0.45rem;
    }

    button[type="submit"]:hover {
      opacity: 0.9;
      box-shadow: 0 4px 20px var(--accent-glow);
    }
    button[type="submit"]:active { transform: scale(0.97); }
    button[type="submit"]:disabled { opacity: 0.4; cursor: not-allowed; transform: none; box-shadow: none; }

    .btn-arrow {
      font-size: 1.05em;
      line-height: 1;
    }

    /* Results */
    #results {
      width: 100%;
      max-width: 640px;
      margin-top: 2.5rem;
    }

    .results-header {
      display: flex;
      align-items: center;
      gap: 0.75rem;
      margin-bottom: 1.25rem;
    }

    .results-label {
      font-size: 0.72rem;
      font-weight: 600;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--muted);
    }

    .results-line {
      flex: 1;
      height: 1px;
      background: var(--border);
    }

    .show-list {
      display: flex;
      flex-direction: column;
      gap: 0;
      border: 1px solid var(--border);
      border-radius: 16px;
      overflow: hidden;
    }

    .show-card {
      background: var(--surface);
      padding: 1.3rem 1.6rem;
      display: grid;
      grid-template-columns: 2rem 1fr;
      gap: 0 1rem;
      align-items: start;
      border-bottom: 1px solid var(--border);
      animation: fadeIn 0.4s ease both;
      transition: background 0.15s;
    }

    .show-card:last-child { border-bottom: none; }

    .show-card:nth-child(2) { animation-delay: 0.07s; }
    .show-card:nth-child(3) { animation-delay: 0.14s; }
    .show-card:nth-child(4) { animation-delay: 0.21s; }
    .show-card:nth-child(5) { animation-delay: 0.28s; }

    .show-card:hover { background: var(--surface2); }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(6px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .show-num {
      font-family: 'DM Serif Display', Georgia, serif;
      font-size: 1.1rem;
      font-style: italic;
      color: var(--muted);
      padding-top: 0.1rem;
      line-height: 1.4;
    }

    .show-content { display: flex; flex-direction: column; gap: 0.25rem; }

    .show-title {
      font-weight: 600;
      font-size: 0.97rem;
      color: var(--text);
      line-height: 1.4;
    }

    .show-meta {
      font-size: 0.75rem;
      color: var(--accent);
      font-weight: 500;
      letter-spacing: 0.04em;
      text-transform: uppercase;
    }

    .show-reason {
      font-size: 0.87rem;
      color: var(--text-dim);
      line-height: 1.6;
      margin-top: 0.2rem;
    }

    /* Spinner */
    .spinner {
      display: flex;
      align-items: center;
      gap: 0.65rem;
      color: var(--muted-light);
      font-size: 0.9rem;
      padding: 1.5rem 0;
    }

    .spinner-ring {
      width: 18px;
      height: 18px;
      border: 2px solid var(--border-light);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      flex-shrink: 0;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    /* Error */
    .error-msg {
      color: #e87171;
      font-size: 0.88rem;
      padding: 1rem 1.25rem;
      background: rgba(232, 113, 113, 0.06);
      border: 1px solid rgba(232, 113, 113, 0.18);
      border-radius: 12px;
      animation: fadeIn 0.3s ease;
    }

    /* Raw fallback */
    .raw-response {
      font-size: 0.9rem;
      line-height: 1.7;
      color: var(--text-dim);
      white-space: pre-wrap;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 1.25rem 1.5rem;
    }
  </style>
</head>
<body>

  <div class="page-inner">

    <header>
      <div class="badge"><span class="badge-dot"></span>AI-powered discovery</div>
      <h1>What do you feel<br>like <em>watching?</em></h1>
      <p class="subtitle">Describe your mood, the vibe you're after, or a story you're craving — and we'll find something perfect.</p>
      <div class="divider"></div>
    </header>

    <div class="card">
      <form id="moodForm">
        <div class="card-body">
          <label for="mood">Your mood or craving</label>
          <textarea
            id="mood"
            name="mood"
            placeholder="Something slow and atmospheric, maybe set in Scandinavia. I want to feel a little unsettled but not scared…"
            required
          ></textarea>
        </div>
        <div class="card-footer">
          <span class="footer-hint">Be as specific or vague as you like</span>
          <button type="submit" id="submitBtn">
            Find Shows <span class="btn-arrow">→</span>
          </button>
        </div>
      </form>
    </div>

    <section id="results" hidden></section>

  </div>

  <script>
    const form = document.getElementById('moodForm');
    const resultsEl = document.getElementById('results');
    const submitBtn = document.getElementById('submitBtn');

    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      const mood = document.getElementById('mood').value.trim();
      if (!mood) return;

      submitBtn.disabled = true;
      submitBtn.innerHTML = 'Thinking… <span class="btn-arrow">→</span>';
      resultsEl.hidden = false;
      resultsEl.innerHTML = `
        <div class="spinner">
          <div class="spinner-ring"></div>
          Finding the right shows for your mood…
        </div>`;

      try {
        const res = await fetch('/api/recommend', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ mood }),
        });

        if (!res.ok) throw new Error(`Server error: ${res.status}`);

        const data = await res.json();
        renderResults(data);
      } catch (err) {
        resultsEl.innerHTML = `<div class="error-msg">Something went wrong: ${err.message}</div>`;
      } finally {
        submitBtn.disabled = false;
        submitBtn.innerHTML = 'Find Shows <span class="btn-arrow">→</span>';
      }
    });

    function renderResults(data) {
      const shows = data.recommendations ?? data.shows ?? null;

      if (shows && Array.isArray(shows) && shows.length > 0) {
        resultsEl.innerHTML = `
          <div class="results-header">
            <span class="results-label">Recommended for you</span>
            <div class="results-line"></div>
          </div>
          <div class="show-list">
            ${shows.map((s, i) => `
              <div class="show-card">
                <span class="show-num">${i + 1}</span>
                <div class="show-content">
                  <span class="show-title">${escHtml(s.title ?? s.name ?? 'Untitled')}</span>
                  ${s.genre || s.type ? `<span class="show-meta">${escHtml(s.genre ?? s.type ?? '')}</span>` : ''}
                  ${s.reason || s.description ? `<p class="show-reason">${escHtml(s.reason ?? s.description ?? '')}</p>` : ''}
                </div>
              </div>`).join('')}
          </div>`;
      } else if (data.message || data.text || typeof data === 'string') {
        const text = data.message ?? data.text ?? data;
        resultsEl.innerHTML = `<p class="raw-response">${escHtml(text)}</p>`;
      } else {
        resultsEl.innerHTML = `<p class="raw-response">${escHtml(JSON.stringify(data, null, 2))}</p>`;
      }
    }

    function escHtml(str) {
      return String(str)
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;');
    }
  </script>

</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Watchpal — Find something worth watching</title>
  <meta name="description" content="Describe your mood and Watchpal finds the perfect film or show for you." />
  <meta property="og:title" content="Watchpal" />
  <meta property="og:description" content="AI-powered film and show recommendations based on your mood." />
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital@1&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    [hidden] { display: none !important; }

    :root {
      --bg:           #F7F5F1;
      --surface:      #EEEAE3;
      --surface-card: #FFFFFF;
      --border:       #E0DBD3;
      --border-light: #D0C9BF;
      --accent:       #C4622D;
      --accent-hover: #A8501F;
      --accent-dim:   rgba(196, 98, 45, 0.08);
      --text:         #1C1C1E;
      --text-dim:     #6B6B6B;
      --muted:        #9B9590;
      --star:         #D4A843;
      --shadow-sm:    0 1px 3px rgba(0,0,0,0.07), 0 1px 2px rgba(0,0,0,0.04);
      --shadow-md:    0 4px 12px rgba(0,0,0,0.08), 0 1px 3px rgba(0,0,0,0.05);
      --shadow-lg:    0 8px 24px rgba(0,0,0,0.10), 0 2px 6px rgba(0,0,0,0.05);
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Inter', system-ui, -apple-system, sans-serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      -webkit-font-smoothing: antialiased;
    }

    .page-inner {
      width: 100%;
      max-width: 680px;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 1.75rem 1.25rem 4rem;
    }

    /* ─── WORDMARK ─── */
    .wordmark {
      width: 100%;
      text-align: center;
      font-size: 1rem;
      font-weight: 700;
      color: var(--text);
      letter-spacing: -0.02em;
      margin-bottom: 1.75rem;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 0.3rem;
    }
    .wordmark-dot { width: 6px; height: 6px; border-radius: 50%; background: var(--accent); }

    /* ─── WELCOME BACK ─── */
    .welcome-back {
      width: 100%;
      font-size: 0.72rem;
      font-weight: 500;
      color: var(--muted);
      margin-bottom: 0.45rem;
      text-align: center;
    }
    .welcome-back span { color: var(--accent); font-weight: 600; }

    /* ─── SEARCH FULL ─── */
    #searchFull {
      width: 100%;
      display: flex;
      flex-direction: column;
      align-items: center;
      transition: opacity 0.28s ease, transform 0.28s ease;
    }
    #searchFull.fading-out { opacity: 0; transform: translateY(-10px); pointer-events: none; }
    @keyframes fadeInDown {
      from { opacity: 0; transform: translateY(-10px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    #searchFull.fading-in { animation: fadeInDown 0.32s ease both; }

    /* ─── HEADER ─── */
    header {
      text-align: center;
      width: 100%;
      margin-bottom: 1.25rem;
    }
    .eyebrow {
      font-size: 0.7rem;
      font-weight: 600;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--accent);
      margin-bottom: 0.7rem;
    }
    h1 {
      font-family: 'Inter', system-ui, sans-serif;
      font-size: clamp(1.75rem, 5vw, 2.6rem);
      font-weight: 600;
      line-height: 1.12;
      color: var(--text);
      letter-spacing: -0.03em;
      margin-bottom: 0.5rem;
    }
    h1 .playfair {
      font-family: 'Playfair Display', Georgia, serif;
      font-style: italic;
      font-weight: 400;
      color: var(--accent);
    }
    .subtitle {
      color: var(--text-dim);
      font-size: 0.88rem;
      line-height: 1.55;
    }
    .divider { width: 28px; height: 2px; background: var(--accent); margin: 0.75rem auto 0; border-radius: 2px; opacity: 0.35; }

    /* ─── SEARCH CARD ─── */
    .search-card {
      background: var(--surface-card);
      border: 1px solid var(--border);
      border-radius: 18px;
      width: 100%;
      overflow: hidden;
      box-shadow: var(--shadow-md);
    }
    .card-body { padding: 1.1rem 1.5rem 0.85rem; }

    label {
      display: block;
      font-size: 0.68rem;
      font-weight: 600;
      color: var(--muted);
      margin-bottom: 0.6rem;
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }

    .input-wrap { position: relative; min-height: 62px; }
    textarea {
      width: 100%;
      min-height: 62px;
      background: transparent;
      border: none;
      color: var(--text);
      font-family: inherit;
      font-size: 1rem;
      line-height: 1.65;
      resize: none;
      outline: none;
      position: relative;
      z-index: 1;
    }
    textarea::placeholder { color: transparent; }

    .ph-overlay {
      position: absolute;
      top: 0; left: 0; right: 0;
      color: var(--muted);
      font-style: italic;
      font-size: 1rem;
      line-height: 1.65;
      pointer-events: none;
      transition: opacity 0.45s ease;
      z-index: 0;
    }
    .ph-overlay.fading { opacity: 0; }

    /* ─── REFINEMENT ROW ─── */
    .refinement-row {
      border-top: 1px solid var(--border);
      padding: 0.6rem 1.5rem;
      background: var(--bg);
      display: flex;
      flex-direction: column;
      gap: 0.5rem;
      animation: refineIn 0.2s ease both;
    }
    @keyframes refineIn {
      from { opacity: 0; transform: translateY(-4px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    .refinement-group {
      display: flex;
      align-items: center;
      gap: 0.6rem;
      flex-wrap: wrap;
    }
    .refinement-label {
      font-size: 0.65rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: var(--muted);
      width: 56px;
      flex-shrink: 0;
    }
    .refinement-pills { display: flex; gap: 0.3rem; flex-wrap: wrap; }
    .r-pill {
      font-family: inherit;
      font-size: 0.73rem;
      font-weight: 500;
      padding: 0.2rem 0.6rem;
      border-radius: 100px;
      border: 1px solid var(--border-light);
      background: var(--surface-card);
      color: var(--text-dim);
      cursor: pointer;
      transition: all 0.12s;
      white-space: nowrap;
    }
    .r-pill:hover:not(.active) { border-color: var(--accent); color: var(--accent); }
    .r-pill.active { background: var(--accent); border-color: var(--accent); color: #fff; font-weight: 600; }

    /* ─── CARD FOOTER ─── */
    .card-footer {
      border-top: 1px solid var(--border);
      padding: 0.65rem 1.5rem;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 1rem;
    }
    .footer-hint { font-size: 0.75rem; color: var(--muted); }

    button[type="submit"] {
      flex-shrink: 0;
      padding: 0.6rem 1.4rem;
      background: var(--accent);
      color: #fff;
      font-family: inherit;
      font-size: 0.88rem;
      font-weight: 600;
      border: none;
      border-radius: 10px;
      cursor: pointer;
      transition: background 0.15s, transform 0.1s, box-shadow 0.15s;
      box-shadow: 0 2px 8px rgba(196, 98, 45, 0.28);
    }
    button[type="submit"]:hover   { background: var(--accent-hover); box-shadow: 0 4px 16px rgba(196, 98, 45, 0.35); }
    button[type="submit"]:active  { transform: scale(0.97); }
    button[type="submit"]:disabled { opacity: 0.45; cursor: not-allowed; transform: none; box-shadow: none; }

    /* ─── MOOD CHIPS ─── */
    .mood-chips-wrap {
      width: 100%;
      margin-top: 0.55rem;
      text-align: center;       /* reliably centres all inline/block children */
    }
    .chips-header {
      margin-bottom: 0.35rem;
    }
    .mood-chips-label {
      font-size: 0.65rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: var(--muted);
    }
    .clear-history-btn {
      font-family: inherit;
      font-size: 0.68rem;
      color: var(--muted);
      background: none;
      border: none;
      cursor: pointer;
      padding: 0;
      text-decoration: underline;
      text-underline-offset: 2px;
      transition: color 0.15s;
      display: block;
      margin: 0.45rem auto 0;
    }
    .clear-history-btn:hover { color: var(--accent); }

    .mood-chips-row {
      display: flex;
      width: 100%;
      gap: 0.35rem;
      flex-wrap: wrap;
      justify-content: center;
    }
    .mood-chip {
      flex-shrink: 0;
      font-family: inherit;
      font-size: 0.78rem;
      font-weight: 500;
      padding: 0.35rem 0.85rem;
      border-radius: 100px;
      border: 1px solid var(--border-light);
      background: var(--surface);
      color: var(--text);
      cursor: pointer;
      transition: border-color 0.15s, color 0.15s, transform 0.1s;
      white-space: nowrap;
    }
    .mood-chip:hover { border-color: var(--accent); color: var(--accent); }
    .mood-chip:active { transform: scale(0.95); }

    /* ─── COMPACT BAR ─── */
    .compact-bar {
      width: 100%;
      display: flex;
      align-items: center;
      gap: 0.85rem;
      padding-bottom: 0.9rem;
      margin-bottom: 0.6rem;
      border-bottom: 1.5px solid rgba(196, 98, 45, 0.22);
      animation: slideDown 0.32s cubic-bezier(0.4, 0, 0.2, 1) both;
    }
    @keyframes slideDown {
      from { opacity: 0; transform: translateY(-4px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    .compact-wordmark {
      display: flex;
      align-items: center;
      gap: 0.28rem;
      font-size: 0.9rem;
      font-weight: 700;
      color: var(--text);
      letter-spacing: -0.02em;
      flex-shrink: 0;
      white-space: nowrap;
    }
    .compact-query-pill {
      flex: 1;
      min-width: 0;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 100px;
      padding: 0.22rem 0.7rem;
      font-size: 0.8rem;
      color: var(--text-dim);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      text-align: center;
    }
    .compact-edit-btn {
      flex-shrink: 0;
      background: none;
      border: none;
      color: var(--accent);
      font-family: inherit;
      font-size: 0.82rem;
      font-weight: 600;
      cursor: pointer;
      padding: 0;
      transition: opacity 0.15s;
      white-space: nowrap;
    }
    .compact-edit-btn:hover { opacity: 0.65; }

    /* ─── RESULTS ─── */
    #results { width: 100%; }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(6px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .results-header {
      width: 100%;
      text-align: center;
      margin-bottom: 0.75rem;
    }
    .results-label {
      font-size: 0.65rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: var(--muted);
    }
    .results-label-mood { color: var(--accent); }

    /* ─── STREAMING BADGES ─── */
    .stream-badges { display: flex; gap: 0.25rem; flex-wrap: wrap; }
    .stream-badge {
      font-size: 0.6rem;
      font-weight: 500;
      padding: 0.1rem 0.42rem;
      border-radius: 4px;
      background: var(--surface);
      border: 1px solid var(--border-light);
      color: var(--text-dim);
      white-space: nowrap;
    }
    .stream-none {
      font-size: 0.65rem;
      color: var(--muted);
    }

    /* ─── RESULT CARDS (list only) ─── */
    .cards-list {
      display: flex;
      flex-direction: column;
      gap: 0.65rem;
    }

    .show-card {
      background: var(--surface-card);
      border: 1px solid var(--border);
      border-radius: 14px;
      display: flex;
      flex-direction: row;
      overflow: hidden;
      transition: box-shadow 0.2s, border-color 0.2s;
      animation: fadeUp 0.35s ease both;
      box-shadow: var(--shadow-sm);
    }
    .show-card:hover { box-shadow: var(--shadow-md); border-color: var(--border-light); }
    .show-card:nth-child(2) { animation-delay: 0.05s; }
    .show-card:nth-child(3) { animation-delay: 0.10s; }
    .show-card:nth-child(4) { animation-delay: 0.15s; }
    .show-card:nth-child(5) { animation-delay: 0.20s; }

    /* Poster */
    .card-poster {
      width: 72px;
      flex-shrink: 0;
      align-self: stretch;
      position: relative;
      background: var(--surface);
      overflow: hidden;
    }
    .card-poster img {
      position: absolute; inset: 0;
      width: 100%; height: 100%;
      object-fit: cover;
      z-index: 1;
    }
    .card-poster.no-img img { display: none; }
    .poster-placeholder {
      position: absolute; inset: 0;
      display: flex; align-items: center; justify-content: center;
      background: linear-gradient(150deg, #EEEAE3 0%, #E4DDD3 100%);
    }
    .ph-num {
      font-family: 'Playfair Display', Georgia, serif;
      font-style: italic;
      font-size: 1.5rem;
      color: var(--border-light);
      font-weight: 400;
    }

    /* Card info */
    .card-info {
      flex: 1;
      padding: 0.9rem 1rem 0.75rem 1rem;
      display: flex;
      flex-direction: column;
      gap: 0.22rem;
      min-width: 0;
    }

    /* Badges row */
    .card-badges {
      display: flex;
      align-items: center;
      gap: 0.3rem;
      flex-wrap: wrap;
      margin-bottom: 0.1rem;
    }
    .format-badge {
      font-size: 0.62rem;
      font-weight: 600;
      letter-spacing: 0.05em;
      text-transform: uppercase;
      padding: 0.1rem 0.4rem;
      border-radius: 4px;
      border: 1px solid var(--border-light);
      color: var(--text-dim);
      background: var(--surface);
      white-space: nowrap;
    }
    .lang-badge {
      font-size: 0.62rem;
      font-weight: 600;
      letter-spacing: 0.05em;
      text-transform: uppercase;
      padding: 0.1rem 0.4rem;
      border-radius: 4px;
      border: 1px solid rgba(196, 98, 45, 0.22);
      color: var(--accent);
      background: var(--accent-dim);
      white-space: nowrap;
    }
    .rating-badge {
      margin-left: auto;
      font-size: 0.68rem;
      font-weight: 600;
      color: #8a6414;
      background: rgba(212, 168, 67, 0.1);
      border: 1px solid rgba(212, 168, 67, 0.25);
      padding: 0.1rem 0.4rem;
      border-radius: 4px;
      white-space: nowrap;
      flex-shrink: 0;
    }

    /* Title + year */
    .card-title-row { display: flex; align-items: baseline; gap: 0.45rem; flex-wrap: wrap; }
    .show-title { font-weight: 600; font-size: 0.9rem; color: var(--text); line-height: 1.3; }
    .show-year  { font-size: 0.72rem; color: var(--muted); flex-shrink: 0; }

    /* Runtime */
    .show-runtime { font-size: 0.72rem; color: var(--muted); }

    /* Description */
    .show-reason {
      font-size: 0.8rem;
      color: var(--text-dim);
      line-height: 1.5;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }

    /* Where to watch */
    .watch-link {
      display: inline-flex;
      align-items: center;
      gap: 0.3rem;
      font-size: 0.73rem;
      font-weight: 500;
      color: var(--accent);
      text-decoration: none;
      margin-top: 0.15rem;
      width: fit-content;
      transition: opacity 0.15s;
    }
    .watch-link:hover { opacity: 0.75; }
    .watch-link svg { flex-shrink: 0; }

    /* ─── CARD ACTIONS ─── */
    .card-bottom-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 0.5rem;
      margin-top: 0.2rem;
      flex-wrap: wrap;
    }
    .card-actions {
      display: flex;
      align-items: center;
      gap: 0.25rem;
      flex-shrink: 0;
    }
    .action-btn {
      font-family: inherit;
      font-size: 0.67rem;
      font-weight: 500;
      color: var(--muted);
      background: none;
      border: none;
      cursor: pointer;
      padding: 0.15rem 0.25rem;
      transition: color 0.15s;
      white-space: nowrap;
      line-height: 1;
    }
    .action-btn:hover        { color: var(--text-dim); }
    .action-nope:hover       { color: #b94040; }
    .action-sep              { color: var(--border-light); font-size: 0.67rem; line-height: 1; user-select: none; }

    /* Reason picker — replaces card-actions on "Not this" tap */
    .reason-picker {
      display: flex;
      align-items: center;
      gap: 0.25rem;
      flex-wrap: wrap;
      animation: refineIn 0.15s ease both;
    }
    .reason-label {
      font-size: 0.63rem;
      color: var(--muted);
      font-weight: 500;
      flex-shrink: 0;
      white-space: nowrap;
    }
    .reason-btn {
      font-family: inherit;
      font-size: 0.63rem;
      font-weight: 500;
      padding: 0.13rem 0.4rem;
      border-radius: 100px;
      border: 1px solid var(--border-light);
      background: var(--surface);
      color: var(--text-dim);
      cursor: pointer;
      transition: all 0.12s;
      white-space: nowrap;
    }
    .reason-btn:hover { border-color: #b94040; color: #b94040; }

    /* Dismiss animation */
    .show-card.card-dismissing {
      opacity: 0;
      transform: translateX(14px);
      transition: opacity 0.28s ease, transform 0.28s ease;
      pointer-events: none;
    }

    /* ─── CONVERSATION THREAD ─── */
    .convo-message {
      font-size: 0.8rem;
      color: var(--muted);
      font-style: italic;
      text-align: center;
      padding: 1rem 0 0.5rem;
      animation: fadeUp 0.3s ease both;
    }
    .convo-batch {
      margin-top: 0.65rem;
    }
    .all-dismissed-msg {
      text-align: center;
      padding: 1.5rem 1rem 0.5rem;
      animation: fadeUp 0.4s ease both;
    }
    .all-dismissed-msg p {
      font-size: 0.88rem;
      color: var(--text-dim);
      line-height: 1.5;
      margin-bottom: 0.9rem;
    }
    .restart-btn {
      font-family: inherit;
      font-size: 0.82rem;
      font-weight: 600;
      padding: 0.48rem 1.1rem;
      border-radius: 10px;
      border: 1.5px solid var(--border-light);
      background: var(--surface-card);
      color: var(--text-dim);
      cursor: pointer;
      transition: border-color 0.15s, color 0.15s;
    }
    .restart-btn:hover { border-color: var(--accent); color: var(--accent); }

    /* ─── RESULTS FOOTER ─── */
    .results-footer {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-top: 1.5rem;
      padding-top: 1.25rem;
      border-top: 1px solid var(--border);
      gap: 1rem;
    }
    .find-more-btn {
      font-family: inherit;
      font-size: 0.84rem;
      font-weight: 600;
      color: var(--accent);
      background: none;
      border: 1.5px solid var(--accent);
      border-radius: 10px;
      padding: 0.52rem 1.1rem;
      cursor: pointer;
      transition: background 0.15s, color 0.15s;
    }
    .find-more-btn:hover    { background: var(--accent); color: #fff; }
    .find-more-btn:disabled { opacity: 0.45; cursor: not-allowed; }

    .refine-btn {
      font-family: inherit;
      font-size: 0.78rem;
      color: var(--text-dim);
      background: none;
      border: none;
      cursor: pointer;
      text-decoration: underline;
      text-underline-offset: 2px;
      transition: color 0.15s;
      padding: 0;
    }
    .refine-btn:hover { color: var(--accent); }

    /* ─── SPINNER / ERROR ─── */
    .spinner {
      display: flex; align-items: center; justify-content: center;
      gap: 0.6rem; color: var(--text-dim); font-size: 0.88rem; padding: 3.5rem 0;
    }
    .spinner-ring {
      width: 16px; height: 16px;
      border: 2px solid var(--border-light);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin 0.75s linear infinite;
      flex-shrink: 0;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    .error-msg {
      color: #C0392B;
      font-size: 0.85rem;
      padding: 1rem 1.25rem;
      background: rgba(192, 57, 43, 0.05);
      border: 1px solid rgba(192, 57, 43, 0.15);
      border-radius: 12px;
      animation: fadeUp 0.3s ease;
    }

    /* ─── EMPTY STATE ─── */
    .empty-state { text-align: center; padding: 3rem 1rem; animation: fadeUp 0.4s ease both; }
    .empty-icon  { font-size: 2rem; margin-bottom: 0.75rem; }
    .empty-text  { font-size: 0.92rem; color: var(--text-dim); line-height: 1.6; margin-bottom: 1.25rem; }
    .empty-chips { display: flex; gap: 0.35rem; justify-content: center; flex-wrap: wrap; }
    .empty-chip  {
      font-family: inherit; font-size: 0.78rem; font-weight: 500;
      padding: 0.35rem 0.9rem; border-radius: 100px;
      border: 1px solid var(--border-light); background: var(--surface);
      color: var(--text); cursor: pointer; transition: border-color 0.15s, color 0.15s;
    }
    .empty-chip:hover { border-color: var(--accent); color: var(--accent); }

    /* ─── RIGHT NOW SECTION ─── */
    .right-now-section {
      width: 100%;
      margin: 1rem 0 0.7rem;
    }
    .right-now-header {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 0.45rem;
      margin-bottom: 0.65rem;
    }
    .right-now-labels { text-align: center; }
    .right-now-label {
      display: block;
      font-size: 0.65rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: var(--accent);
    }
    .right-now-subtitle {
      font-size: 0.68rem;
      color: var(--muted);
    }
    .right-now-refresh {
      background: none;
      border: none;
      cursor: pointer;
      color: var(--muted);
      padding: 0.2rem;
      line-height: 0;
      transition: color 0.15s;
      flex-shrink: 0;
    }
    .right-now-refresh:hover:not(:disabled) { color: var(--accent); }
    .right-now-refresh:disabled { opacity: 0.35; cursor: default; }
    .right-now-refresh.spinning svg { animation: spin 0.7s linear infinite; }

    /* Horizontal card row */
    .right-now-cards {
      display: flex;
      gap: 0.65rem;
      overflow-x: auto;
      scrollbar-width: none;
      padding: 0.15rem 0 0.4rem;
      justify-content: center;
    }
    .right-now-cards::-webkit-scrollbar { display: none; }

    /* Compact poster card */
    .rn-card {
      flex-shrink: 0;
      width: 108px;
      cursor: pointer;
      transition: transform 0.15s;
    }
    .rn-card:hover { transform: translateY(-3px); }
    .rn-poster {
      width: 108px;
      height: 162px;
      border-radius: 10px;
      overflow: hidden;
      background: var(--surface);
      position: relative;
      margin-bottom: 0.35rem;
      box-shadow: var(--shadow-sm);
    }
    .rn-poster img {
      position: absolute; inset: 0;
      width: 100%; height: 100%;
      object-fit: cover;
    }
    .rn-poster.rn-no-img img { display: none; }
    .rn-poster-ph {
      position: absolute; inset: 0;
      display: flex; align-items: center; justify-content: center;
      background: linear-gradient(150deg, #EEEAE3 0%, #E4DDD3 100%);
      font-family: 'Playfair Display', Georgia, serif;
      font-style: italic;
      font-size: 1.6rem;
      color: var(--border-light);
    }
    .rn-title {
      font-size: 0.72rem;
      font-weight: 600;
      color: var(--text);
      line-height: 1.3;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }
    .rn-rating {
      font-size: 0.65rem;
      color: #8a6414;
      margin-top: 0.1rem;
    }

    /* Skeleton */
    .rn-skeleton { flex-shrink: 0; width: 108px; }
    .rn-skeleton-poster {
      width: 108px; height: 162px;
      border-radius: 10px;
      background: linear-gradient(90deg, var(--surface) 0%, var(--border) 50%, var(--surface) 100%);
      background-size: 200% 100%;
      animation: shimmer 1.4s ease-in-out infinite;
      margin-bottom: 0.35rem;
    }
    .rn-skeleton-line {
      height: 9px; border-radius: 4px;
      background: var(--surface); margin-top: 0.25rem;
    }
    @keyframes shimmer {
      0%   { background-position:  200% 0; }
      100% { background-position: -200% 0; }
    }
    .rn-error { font-size: 0.78rem; color: var(--muted); text-align: center; padding: 1rem 0; }

    /* ─── RIGHT NOW MODAL ─── */
    .rn-modal-overlay {
      position: fixed; inset: 0;
      background: rgba(28, 28, 30, 0.52);
      display: flex; align-items: center; justify-content: center;
      z-index: 999; padding: 1.25rem;
      backdrop-filter: blur(3px);
      animation: fadeIn 0.18s ease;
    }
    @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    .rn-modal-box {
      background: var(--surface-card);
      border-radius: 18px; width: 100%; max-width: 440px;
      max-height: 85vh; overflow-y: auto;
      box-shadow: var(--shadow-lg); position: relative;
      animation: slideUp 0.22s ease both;
    }
    @keyframes slideUp {
      from { transform: translateY(18px); opacity: 0; }
      to   { transform: translateY(0);    opacity: 1; }
    }
    .rn-modal-close {
      position: absolute; top: 0.8rem; right: 1rem;
      background: none; border: none;
      font-size: 1.35rem; color: var(--muted);
      cursor: pointer; line-height: 1; padding: 0.15rem 0.3rem;
      transition: color 0.15s; z-index: 1;
    }
    .rn-modal-close:hover { color: var(--text); }
    .rn-modal-content {
      display: flex; gap: 1rem; padding: 1.35rem 1.25rem;
      align-items: flex-start;
    }
    .rn-modal-poster {
      width: 88px; height: 132px; flex-shrink: 0;
      border-radius: 10px; overflow: hidden;
      background: var(--surface); position: relative;
    }
    .rn-modal-poster img {
      position: absolute; inset: 0;
      width: 100%; height: 100%; object-fit: cover;
    }
    .rn-modal-poster.rn-no-img img { display: none; }
    .rn-modal-info { flex: 1; min-width: 0; }
    .rn-modal-title {
      font-size: 1rem; font-weight: 600; color: var(--text);
      line-height: 1.3; margin-bottom: 0.2rem;
    }

    /* ─── MOBILE ─── */
    @media (max-width: 640px) {
      /* More breathing room: page top + heading → card gap */
      .page-inner { padding-top: 2.25rem; }
      header { margin-bottom: 1.75rem; }

      /* Hide format filter — desktop only for now */
      #refinementRow { display: none !important; }

      /* Hide keyboard hint — wastes space on mobile */
      .footer-hint { display: none; }

      /* Discover button fills the full card width */
      .card-footer {
        justify-content: stretch;
      }
      button[type="submit"] {
        width: 100%;
      }

      /* Quick Picks: single horizontal scroll row, max 4 chips */
      .mood-chips-row {
        flex-wrap: nowrap;
        overflow-x: auto;
        overflow-y: hidden;
        justify-content: flex-start;
        scrollbar-width: none;
        -webkit-overflow-scrolling: touch;
        padding-bottom: 2px; /* clip shadow */
      }
      .mood-chips-row::-webkit-scrollbar { display: none; }
      .mood-chip:nth-child(n+5) { display: none; }
    }
  </style>
</head>
<body>

  <div class="page-inner">

    <!-- Wordmark -->
    <div class="wordmark" id="wordmarkEl">
      <span class="wordmark-dot"></span>
      Watchpal
    </div>

    <!-- Full search section -->
    <div id="searchFull">
      <header>
        <p class="eyebrow">AI-powered discovery</p>
        <h1>What do you feel like<br><span class="playfair">watching?</span></h1>
        <p class="subtitle">Describe your mood, the vibe you're after, or a story you're craving.</p>
        <div class="divider"></div>
      </header>

      <div class="search-card">
        <form id="moodForm">
          <div class="card-body">
            <label for="mood">Your mood or craving</label>
            <div class="input-wrap">
              <textarea id="mood" name="mood" required></textarea>
              <div class="ph-overlay" id="phOverlay"></div>
            </div>
          </div>

          <!-- Refinement row — shown on focus -->
          <div id="refinementRow" class="refinement-row" hidden>
            <div class="refinement-group">
              <span class="refinement-label">Format</span>
              <div class="refinement-pills">
                <button class="r-pill active" type="button" data-group="format" data-value="all">All</button>
                <button class="r-pill"        type="button" data-group="format" data-value="movie">Movie</button>
                <button class="r-pill"        type="button" data-group="format" data-value="series">Series</button>
                <button class="r-pill"        type="button" data-group="format" data-value="documentary">Documentary</button>
              </div>
            </div>
          </div>

          <div class="card-footer">
            <span class="footer-hint">Enter to search · Shift+Enter for new line</span>
            <button type="submit" id="submitBtn">Discover →</button>
          </div>
        </form>
      </div>

      <!-- Right Now section — time-aware automatic picks -->
      <div id="rightNowSection" class="right-now-section" hidden>
        <div class="right-now-header">
          <div class="right-now-labels">
            <span class="right-now-label" id="rightNowLabel">Right now</span>
            <span class="right-now-subtitle">picked for right now</span>
          </div>
          <button class="right-now-refresh" id="rightNowRefresh" aria-label="Refresh picks" title="Refresh picks">
            <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.3" stroke-linecap="round" stroke-linejoin="round">
              <polyline points="23 4 23 10 17 10"/>
              <polyline points="1 20 1 14 7 14"/>
              <path d="M3.51 9a9 9 0 0 1 14.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0 0 20.49 15"/>
            </svg>
          </button>
        </div>
        <div class="right-now-cards" id="rightNowCards"></div>
      </div>

      <!-- Mood chips — below the input card, populated by JS -->
      <div class="mood-chips-wrap">
        <div class="chips-header">
          <div class="mood-chips-label" id="chipsLabel">Quick picks</div>
        </div>
        <div id="welcomeBack" class="welcome-back" hidden>
          Welcome back — <span>picks based on your history</span>
        </div>
        <div class="mood-chips-row" id="moodChipsRow"></div>
        <button class="clear-history-btn" id="clearHistoryBtn" hidden>Clear history</button>
      </div>
    </div>

    <!-- Compact bar shown after search -->
    <div id="compactBar" class="compact-bar" hidden>
      <div class="compact-wordmark">
        <span class="wordmark-dot"></span>
        Watchpal
      </div>
      <div id="compactQueryText" class="compact-query-pill"></div>
      <button id="newSearchBtn" class="compact-edit-btn">Edit</button>
    </div>

    <!-- Results -->
    <section id="results" hidden></section>

  </div>

  <script>
    /* ── DOM refs ── */
    const form             = document.getElementById('moodForm');
    const resultsEl        = document.getElementById('results');
    const submitBtn        = document.getElementById('submitBtn');
    const searchFull       = document.getElementById('searchFull');
    const compactBar       = document.getElementById('compactBar');
    const compactQueryText = document.getElementById('compactQueryText');
    const newSearchBtn     = document.getElementById('newSearchBtn');
    const moodInput        = document.getElementById('mood');
    const phOverlay        = document.getElementById('phOverlay');
    const refinementRow    = document.getElementById('refinementRow');
    const wordmarkEl       = document.getElementById('wordmarkEl');

    /* ── State ── */
    let allShows             = [];
    let currentMood          = '';
    let shownTitles          = [];
    let refinements          = { format: 'all' };
    let dismissedThisSession = new Set();   // all dismissed titles (seen + rejected)
    let rejectedThisSession  = [];          // [{ title, reason }]
    let activeCardCount      = 0;

    /* ── Watched localStorage ── */
    const WATCHED_KEY = 'watchpal_watched';
    function getWatched() {
      try { return JSON.parse(localStorage.getItem(WATCHED_KEY) || '[]'); }
      catch { return []; }
    }
    function addToWatched(title) {
      const w = getWatched();
      if (!w.includes(title)) {
        w.push(title);
        localStorage.setItem(WATCHED_KEY, JSON.stringify(w));
      }
    }

    /* ── localStorage history ── */
    const HISTORY_KEY = 'watchpal_history';
    const MAX_HISTORY = 10;

    function getHistory() {
      try { return JSON.parse(localStorage.getItem(HISTORY_KEY) || '[]'); }
      catch { return []; }
    }
    const GENERIC_BLOCKLIST = new Set([
      'anything','something','movies','movie','shows','show','series',
      'films','film','documentary','documentaries','recommend','suggestions',
      'good','great','best','watch','watching','help','please','yes','no',
    ]);

    function isMeaningfulQuery(query) {
      const words = query.trim().split(/\s+/);
      if (words.length < 3) return false;
      // Also reject if it's a single word (shouldn't reach here after length check, but defensive)
      if (words.length === 1 && GENERIC_BLOCKLIST.has(words[0].toLowerCase())) return false;
      return true;
    }

    function saveToHistory(query) {
      if (!isMeaningfulQuery(query)) return;
      const h = getHistory().filter(e => e.query.toLowerCase() !== query.toLowerCase());
      h.unshift({ query, timestamp: Date.now() });
      localStorage.setItem(HISTORY_KEY, JSON.stringify(h.slice(0, MAX_HISTORY)));
    }
    function clearHistory() { localStorage.removeItem(HISTORY_KEY); }

    /* ── Chips ── */
    const DEFAULT_CHIPS = [
      'Something to cry to','Friday night energy','Impress a date',
      'Tamil classics','Mind-bending sci-fi','Cozy Sunday',
      'Late night alone','Feel good','Edge of your seat',
    ];

    function renderChips() {
      const history   = getHistory();
      const label     = document.getElementById('chipsLabel');
      const row       = document.getElementById('moodChipsRow');
      const clearBtn  = document.getElementById('clearHistoryBtn');
      const welcomeEl = document.getElementById('welcomeBack');

      if (history.length > 0) {
        label.textContent    = 'YOUR PICKS';
        clearBtn.hidden      = false;
        welcomeEl.hidden     = false;
        row.innerHTML        = history.slice(0, 5)
          .map(e => `<button class="mood-chip" type="button">${escHtml(e.query)}</button>`)
          .join('');
      } else {
        label.textContent    = 'QUICK PICKS';
        clearBtn.hidden      = true;
        welcomeEl.hidden     = true;
        row.innerHTML        = DEFAULT_CHIPS
          .map(c => `<button class="mood-chip" type="button">${c}</button>`)
          .join('');
      }
      row.onclick = e => {
        const chip = e.target.closest('.mood-chip');
        if (chip) submitMood(chip.textContent.trim());
      };
    }

    document.getElementById('clearHistoryBtn').addEventListener('click', () => {
      clearHistory();
      renderChips();
    });

    renderChips();

    /* ── Rotating placeholder ── */
    const PLACEHOLDERS = [
      'I want something slow and unsettling…',
      'Friday night, something funny but not stupid',
      'A film that feels like rain',
      'Something my mum would love',
      'Tamil cinema that changed how I see the world',
      "A story I won't stop thinking about",
    ];
    let phIndex = 0, phTimer = null;

    function cyclePlaceholder() {
      phOverlay.classList.add('fading');
      setTimeout(() => {
        phIndex = (phIndex + 1) % PLACEHOLDERS.length;
        phOverlay.textContent = PLACEHOLDERS[phIndex];
        phOverlay.classList.remove('fading');
      }, 450);
    }
    function startPlaceholder() {
      phOverlay.textContent = PLACEHOLDERS[phIndex];
      phOverlay.style.display = '';
      clearInterval(phTimer);
      phTimer = setInterval(cyclePlaceholder, 3000);
    }
    function stopPlaceholder() {
      clearInterval(phTimer); phTimer = null;
      phOverlay.style.display = 'none';
    }

    moodInput.addEventListener('input', () => {
      moodInput.value ? stopPlaceholder() : startPlaceholder();
    });
    startPlaceholder();

    /* ── Show refinements on focus ── */
    moodInput.addEventListener('focus', () => {
      refinementRow.hidden = false;
    });

    /* ── Refinement pill toggles ── */
    refinementRow.addEventListener('click', e => {
      const pill = e.target.closest('.r-pill');
      if (!pill) return;
      const group = pill.dataset.group;
      const value = pill.dataset.value;
      refinements[group] = value;
      refinementRow.querySelectorAll(`.r-pill[data-group="${group}"]`).forEach(p => p.classList.remove('active'));
      pill.classList.add('active');
    });

    /* ── Enter key submits; Shift+Enter = newline ── */
    moodInput.addEventListener('keydown', e => {
      if (e.key === 'Enter' && !e.shiftKey) {
        e.preventDefault();
        if (!submitBtn.disabled && moodInput.value.trim()) {
          form.dispatchEvent(new Event('submit', { bubbles: true, cancelable: true }));
        }
      }
    });

    /* ── Chip submit ── */
    function submitMood(text) {
      moodInput.value = text;
      stopPlaceholder();
      refinementRow.hidden = false;
      setTimeout(() => form.dispatchEvent(new Event('submit', { bubbles: true, cancelable: true })), 60);
    }

    /* ── Collapse / expand ── */
    function collapseSearch(moodText) {
      compactQueryText.textContent = moodText;
      searchFull.classList.add('fading-out');
      setTimeout(() => {
        searchFull.hidden  = true;
        wordmarkEl.hidden  = true;
        searchFull.classList.remove('fading-out');
        compactBar.hidden  = false;
      }, 280);
    }

    function expandSearch(openRefinements = false) {
      compactBar.hidden  = true;
      wordmarkEl.hidden  = false;
      resultsEl.hidden   = true;
      resultsEl.innerHTML = '';
      allShows             = [];
      shownTitles          = [];
      dismissedThisSession = new Set();
      rejectedThisSession  = [];
      activeCardCount      = 0;
      searchFull.hidden = false;
      searchFull.classList.add('fading-in');
      renderChips();
      setTimeout(() => {
        searchFull.classList.remove('fading-in');
        moodInput.focus();
        if (!moodInput.value) startPlaceholder();
        if (openRefinements) refinementRow.hidden = false;
      }, 340);
    }

    newSearchBtn.addEventListener('click', () => expandSearch());

    /* ── Fetch helper ── */
    async function fetchRecommendations(mood, exclude = [], count = 5) {
      const recentHistory = getHistory().slice(1, 4).map(h => h.query);
      const res = await fetch('/api/recommend', {
        method:  'POST',
        headers: { 'Content-Type': 'application/json' },
        body:    JSON.stringify({
          mood, refinements, exclude, history: recentHistory,
          watched:  getWatched(),
          rejected: rejectedThisSession,
          count,
        }),
      });
      if (!res.ok) throw new Error(`Server error: ${res.status}`);
      const data = await res.json();
      return data.recommendations ?? [];
    }

    /* ── Form submit ── */
    form.addEventListener('submit', async e => {
      e.preventDefault();
      const mood = moodInput.value.trim();
      if (!mood) return;

      currentMood          = mood;
      allShows             = [];
      shownTitles          = [];
      dismissedThisSession = new Set();
      rejectedThisSession  = [];
      activeCardCount      = 0;

      submitBtn.disabled   = true;
      submitBtn.textContent = 'Thinking…';
      resultsEl.hidden      = false;
      resultsEl.innerHTML   = `
        <div class="spinner">
          <div class="spinner-ring"></div>
          Finding films &amp; shows for your mood…
        </div>`;

      saveToHistory(mood);
      collapseSearch(mood);

      try {
        const results = await fetchRecommendations(mood);
        allShows    = results;
        shownTitles = results.map(s => s.title);
        renderResults();
      } catch (err) {
        resultsEl.innerHTML = `<div class="error-msg">Something went wrong: ${err.message}</div>`;
      } finally {
        submitBtn.disabled    = false;
        submitBtn.textContent = 'Discover →';
      }
    });

    /* ── Card dismissal ── */
    function dismissCard(cardEl, title, type, reason) {
      dismissedThisSession.add(title);
      activeCardCount = Math.max(0, activeCardCount - 1);

      if (type === 'seen') {
        addToWatched(title);
      } else {
        rejectedThisSession.push({ title, reason });
      }

      cardEl.classList.add('card-dismissing');
      setTimeout(() => {
        cardEl.hidden = true;
        updateFindMoreBtn();
        if (activeCardCount <= 0) showAllDismissed();
      }, 300);
    }

    function showReasonPicker(cardEl) {
      const actionsEl = cardEl.querySelector('.card-actions');
      actionsEl.innerHTML = `
        <span class="reason-label">Why not?</span>
        <button class="reason-btn" data-reason="Too dark">Too dark</button>
        <button class="reason-btn" data-reason="Too long">Too long</button>
        <button class="reason-btn" data-reason="Not in the mood">Not in the mood</button>
        <button class="reason-btn" data-reason="Just not feeling it">Just not feeling it</button>`;
    }

    function updateFindMoreBtn() {
      const btn = document.getElementById('findMoreBtn');
      if (!btn) return;
      // Show the button as soon as something has been dismissed and cards remain
      btn.hidden = !(dismissedThisSession.size > 0 && activeCardCount > 0);
    }

    function showAllDismissed() {
      const thread = document.getElementById('conversationThread');
      if (!thread) return;
      const el = document.createElement('div');
      el.className = 'all-dismissed-msg';
      el.innerHTML = `
        <p>You've dismissed everything — let's start fresh.</p>
        <button class="restart-btn">Try a different mood →</button>`;
      el.querySelector('.restart-btn').addEventListener('click', () => expandSearch());
      thread.appendChild(el);
      const footer = document.getElementById('resultsFooter');
      if (footer) footer.hidden = true;
    }

    /* ── Find something else (conversational refine) ── */
    async function findSomethingElse() {
      const btn = document.getElementById('findMoreBtn');
      if (btn) { btn.disabled = true; btn.textContent = 'Finding…'; }

      const thread = document.getElementById('conversationThread');

      // Contextual loading message
      const msgEl = document.createElement('div');
      msgEl.className = 'convo-message';
      msgEl.textContent = 'Got it — finding something better…';
      thread.appendChild(msgEl);
      msgEl.scrollIntoView({ behavior: 'smooth', block: 'nearest' });

      const allExclude = [...shownTitles, ...dismissedThisSession];

      try {
        const results = await fetchRecommendations(currentMood, allExclude, 3);
        msgEl.remove();

        if (!results.length) {
          const emptyEl = document.createElement('div');
          emptyEl.className = 'convo-message';
          emptyEl.textContent = 'Nothing new to suggest — try refining your search.';
          thread.appendChild(emptyEl);
          if (btn) { btn.disabled = false; btn.textContent = 'Find me something else →'; }
          return;
        }

        // Append new batch
        const startIndex = allShows.length;
        allShows    = [...allShows, ...results];
        shownTitles = [...shownTitles, ...results.map(s => s.title)];
        activeCardCount += results.length;

        const batchEl = document.createElement('div');
        batchEl.className = 'cards-list convo-batch';
        batchEl.innerHTML = results.map((s, i) => renderCard(s, startIndex + i)).join('');
        thread.appendChild(batchEl);
        batchEl.scrollIntoView({ behavior: 'smooth', block: 'start' });

        if (btn) { btn.disabled = false; btn.textContent = 'Find me something else →'; }
        updateFindMoreBtn();

      } catch (err) {
        msgEl.remove();
        const errEl = document.createElement('div');
        errEl.className = 'error-msg';
        errEl.style.marginTop = '0.75rem';
        errEl.textContent = 'Something went wrong — try again.';
        thread.appendChild(errEl);
        if (btn) { btn.disabled = false; btn.textContent = 'Find me something else →'; }
      }
    }

    /* ── Render results ── */
    function renderResults() {
      if (!allShows.length) {
        resultsEl.innerHTML = `
          <div class="empty-state">
            <div class="empty-icon">🎬</div>
            <p class="empty-text">Nothing matched — try describing a mood or feeling instead.</p>
            <div class="empty-chips">
              <button class="empty-chip">Feel good</button>
              <button class="empty-chip">Edge of your seat</button>
              <button class="empty-chip">Cozy Sunday</button>
            </div>
          </div>`;
        resultsEl.querySelector('.empty-chips').addEventListener('click', e => {
          const chip = e.target.closest('.empty-chip');
          if (chip) { expandSearch(); setTimeout(() => submitMood(chip.textContent.trim()), 400); }
        });
        return;
      }

      activeCardCount = allShows.length;

      resultsEl.innerHTML = `
        <div class="results-header">
          <span class="results-label">${allShows.length} picks for &nbsp;·&nbsp; <span class="results-label-mood">${escHtml(currentMood)}</span></span>
        </div>
        <div id="conversationThread">
          <div class="cards-list">
            ${allShows.map((s, i) => renderCard(s, i)).join('')}
          </div>
        </div>
        <div id="resultsFooter" class="results-footer">
          <button class="find-more-btn" id="findMoreBtn" hidden>Find me something else →</button>
          <button class="refine-btn"    id="refineBtn">Refine search ↑</button>
        </div>`;

      document.getElementById('findMoreBtn').addEventListener('click', findSomethingElse);
      document.getElementById('refineBtn').addEventListener('click', () => expandSearch(true));
    }

    /* ── Streaming provider helpers ── */
    function normaliseProvider(name) {
      const n = name.toLowerCase();
      if (n.includes('netflix'))                      return 'Netflix';
      if (n.includes('prime') || n.includes('amazon')) return 'Prime Video';
      if (n.includes('disney'))                        return 'Disney+';
      if (n.includes('binge') || n.includes('foxtel')) return 'Binge';
      if (n.includes('stan'))                          return 'Stan';
      if (n.includes('apple'))                         return 'Apple TV+';
      if (n.includes('paramount'))                     return 'Paramount+';
      if (n.includes('abc'))                           return 'ABC iview';
      if (n.includes('sbs'))                           return 'SBS';
      return name;
    }

    function renderStreamingBadges(streamingAU) {
      if (!Array.isArray(streamingAU)) return ''; // no TMDB data available
      if (streamingAU.length === 0)
        return '<span class="stream-none">Not on AU streaming</span>';
      const names = [...new Set(streamingAU.map(normaliseProvider))].slice(0, 5);
      return `<div class="stream-badges">${names.map(n => `<span class="stream-badge">${escHtml(n)}</span>`).join('')}</div>`;
    }

    /* ── Render card ── */
    function renderCard(s, i) {
      const hasPoster    = !!s.poster;
      const isNonEnglish = s.language && s.language.toLowerCase() !== 'english';
      const titleAttr    = escAttr(s.title ?? '');

      return `
        <div class="show-card" data-title="${titleAttr}">
          <div class="card-poster${hasPoster ? '' : ' no-img'}">
            <div class="poster-placeholder"><span class="ph-num">${i + 1}</span></div>
            ${hasPoster ? `<img src="${escAttr(s.poster)}" alt="${titleAttr}" loading="lazy" onerror="this.closest('.card-poster').classList.add('no-img')">` : ''}
          </div>
          <div class="card-info">
            <div class="card-badges">
              ${s.format     ? `<span class="format-badge">${escHtml(s.format)}</span>` : ''}
              ${isNonEnglish ? `<span class="lang-badge">${escHtml(s.language)}</span>` : ''}
              ${s.imdbRating ? `<span class="rating-badge">★ ${escHtml(s.imdbRating)}</span>` : ''}
            </div>
            <div class="card-title-row">
              <span class="show-title">${escHtml(s.title ?? 'Untitled')}</span>
              ${s.year ? `<span class="show-year">${escHtml(s.year)}</span>` : ''}
            </div>
            ${s.runtime ? `<span class="show-runtime">${escHtml(s.runtime)}</span>` : ''}
            ${s.reason  ? `<p class="show-reason">${escHtml(s.reason)}</p>` : ''}
            <div class="card-bottom-row">
              ${renderStreamingBadges(s.streamingAU)}
              <div class="card-actions">
                <button class="action-btn" data-action="seen">✓ Seen it</button>
                <span class="action-sep">·</span>
                <button class="action-btn action-nope" data-action="nope">✕ Not this</button>
              </div>
            </div>
          </div>
        </div>`;
    }

    /* ── Card action delegation (single listener, survives re-renders) ── */
    resultsEl.addEventListener('click', e => {
      // "Seen it"
      const seenBtn = e.target.closest('[data-action="seen"]');
      if (seenBtn) {
        const card  = seenBtn.closest('.show-card');
        const title = card?.dataset.title;
        if (card && title) dismissCard(card, title, 'seen', null);
        return;
      }
      // "Not this" — show reason picker
      const nopeBtn = e.target.closest('[data-action="nope"]');
      if (nopeBtn) {
        const card = nopeBtn.closest('.show-card');
        if (card) showReasonPicker(card);
        return;
      }
      // Reason selected
      const reasonBtn = e.target.closest('.reason-btn');
      if (reasonBtn) {
        const card   = reasonBtn.closest('.show-card');
        const title  = card?.dataset.title;
        const reason = reasonBtn.dataset.reason;
        if (card && title) dismissCard(card, title, 'nope', reason);
        return;
      }
    });

    /* ── RIGHT NOW — time-aware automatic recommendations ── */

    function getTimeSlot() {
      const now  = new Date();
      const day  = now.getDay();   // 0=Sun … 6=Sat
      const hour = now.getHours();
      const mins = now.getMinutes();
      const timeStr = now.toLocaleTimeString('en-US', { hour: 'numeric', minute: '2-digit', hour12: true });
      const days = ['Sunday','Monday','Tuesday','Wednesday','Thursday','Friday','Saturday'];
      const d = days[day];

      const mood = (desc) =>
        `It is currently ${d} at ${timeStr} local time. ${desc} ` +
        `Return exactly 3 results. Factor in the day and time heavily — ` +
        `these picks must feel right for THIS specific moment.`;

      // Friday night
      if (day === 5 && hour >= 17)
        return { label: 'Friday night sorted',
          prompt: mood('Suggest 3 films or shows for Friday night — exciting, fun, high-energy. Something people would genuinely want to watch with friends or alone winding down the week.') };

      // Saturday
      if (day === 6) {
        if (hour < 12)
          return { label: 'A lazy Saturday pick',
            prompt: mood('Suggest 3 films or shows for a relaxed Saturday morning — comfortable, easy-going, not too intense. Coffee and couch energy.') };
        if (hour < 17)
          return { label: 'A lazy Saturday pick',
            prompt: mood('Suggest 3 films or shows for a Saturday afternoon — enjoyable, could be anything from funny to dramatic. Weekend freedom energy.') };
        return { label: 'Saturday night in',
          prompt: mood('Suggest 3 films or shows for a Saturday night in — entertaining and engaging, great for social viewing or a solo treat.') };
      }

      // Sunday
      if (day === 0) {
        if (hour < 12)
          return { label: 'Sunday morning slow watch',
            prompt: mood('Suggest 3 films or shows for a slow Sunday morning — gentle, atmospheric, unhurried. Something that feels like a warm cup of tea.') };
        if (hour < 17)
          return { label: 'A perfect Sunday afternoon',
            prompt: mood('Suggest 3 films or shows for a Sunday afternoon — atmospheric, emotional, slow-burn. The kind of thing you talk about for days.') };
        if (hour < 22)
          return { label: 'Before the week begins',
            prompt: mood('Suggest 3 films or shows for a Sunday evening — comforting but not too heavy. Winding down before Monday, something that leaves you feeling good.') };
        return { label: 'Before the week begins',
          prompt: mood('Suggest 3 films or shows for a late Sunday night — something absorbing but not too long or intense before the week begins.') };
      }

      // Weekday (Mon–Thu, and Fri before 5pm)
      if (hour >= 6 && hour < 12)
        return { label: `A ${d} morning pick`,
          prompt: mood(`Suggest 3 films or shows for a ${d} morning — short, energising, or uplifting. Something that fits a weekday start.`) };
      if (hour >= 12 && hour < 18)
        return { label: `For a ${d} afternoon`,
          prompt: mood(`Suggest 3 films or shows for a ${d} afternoon — a mid-day escape. Varied tone, easy to get into.`) };
      if (hour >= 18 && hour < 23)
        return { label: `A ${d} night watch`,
          prompt: mood(`Suggest 3 films or shows for a ${d} evening — engaging but not overwhelming given work tomorrow.`) };
      return { label: `A ${d} night watch`,
        prompt: mood(`Suggest 3 films or shows for a late ${d} night — compelling, ideally not too long for a weeknight.`) };
    }

    let rightNowShows = [];

    function renderRightNowSkeletons() {
      const el = document.getElementById('rightNowCards');
      if (!el) return;
      el.innerHTML = [1,2,3].map(() => `
        <div class="rn-skeleton">
          <div class="rn-skeleton-poster"></div>
          <div class="rn-skeleton-line" style="width:78%"></div>
          <div class="rn-skeleton-line" style="width:48%;margin-top:0.2rem"></div>
        </div>`).join('');
    }

    function renderRightNowCards(shows) {
      const el = document.getElementById('rightNowCards');
      if (!el) return;
      rightNowShows = shows;
      // Reveal section now that real results are ready
      document.getElementById('rightNowSection').hidden = false;
      el.innerHTML = shows.map((s, i) => {
        const hp = !!s.poster;
        return `
          <div class="rn-card" data-rn-index="${i}" role="button" tabindex="0" aria-label="${escAttr(s.title ?? '')}">
            <div class="rn-poster${hp ? '' : ' rn-no-img'}">
              <div class="rn-poster-ph">${i + 1}</div>
              ${hp ? `<img src="${escAttr(s.poster)}" alt="${escAttr(s.title ?? '')}" loading="lazy" onerror="this.closest('.rn-poster').classList.add('rn-no-img')">` : ''}
            </div>
            <div class="rn-title">${escHtml(s.title ?? '')}</div>
            ${s.imdbRating ? `<div class="rn-rating">★ ${escHtml(s.imdbRating)}</div>` : ''}
          </div>`;
      }).join('');
    }

    async function loadRightNow() {
      const slot       = getTimeSlot();
      const labelEl    = document.getElementById('rightNowLabel');
      const refreshBtn = document.getElementById('rightNowRefresh');

      if (labelEl)    labelEl.textContent = slot.label;
      if (refreshBtn) { refreshBtn.disabled = true; refreshBtn.classList.add('spinning'); }

      renderRightNowSkeletons();

      try {
        const res = await fetch('/api/recommend', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            mood:        slot.prompt,
            count:       3,
            watched:     getWatched(),
            exclude:     [],
            refinements: {},
            history:     [],
            rejected:    [],
          }),
        });
        if (!res.ok) throw new Error('API error');
        const data = await res.json();
        const shows = data.recommendations ?? [];
        if (!shows.length) throw new Error('No results');
        renderRightNowCards(shows);
      } catch {
        const el = document.getElementById('rightNowCards');
        if (el) el.innerHTML = '<p class="rn-error">Couldn\'t load picks right now.</p>';
      } finally {
        if (refreshBtn) { refreshBtn.disabled = false; refreshBtn.classList.remove('spinning'); }
      }
    }

    /* ── Right Now modal ── */
    function openRnModal(index) {
      const s = rightNowShows[index];
      if (!s) return;
      const watchUrl     = `https://www.google.com/search?q=watch+${encodeURIComponent(s.title)}+streaming`;
      const isNonEnglish = s.language && s.language.toLowerCase() !== 'english';
      const hp           = !!s.poster;
      const modal        = document.getElementById('rnModal');

      modal.querySelector('.rn-modal-content').innerHTML = `
        <div class="rn-modal-poster${hp ? '' : ' rn-no-img'}">
          <div class="rn-poster-ph">★</div>
          ${hp ? `<img src="${escAttr(s.poster)}" alt="${escAttr(s.title ?? '')}" onerror="this.closest('.rn-modal-poster').classList.add('rn-no-img')">` : ''}
        </div>
        <div class="rn-modal-info">
          <div class="card-badges" style="margin-bottom:0.4rem;flex-wrap:wrap">
            ${s.format     ? `<span class="format-badge">${escHtml(s.format)}</span>` : ''}
            ${isNonEnglish ? `<span class="lang-badge">${escHtml(s.language)}</span>` : ''}
            ${s.imdbRating ? `<span class="rating-badge">★ ${escHtml(s.imdbRating)}</span>` : ''}
          </div>
          <div class="rn-modal-title">
            ${escHtml(s.title ?? '')}${s.year ? ` <span class="show-year">${escHtml(s.year)}</span>` : ''}
          </div>
          ${s.runtime ? `<span class="show-runtime">${escHtml(s.runtime)}</span>` : ''}
          ${s.reason  ? `<p class="show-reason" style="margin-top:0.45rem;-webkit-line-clamp:unset;overflow:visible">${escHtml(s.reason)}</p>` : ''}
          <div style="margin-top:0.65rem">${renderStreamingBadges(s.streamingAU)}</div>
        </div>`;

      modal.hidden = false;
      document.body.style.overflow = 'hidden';
    }

    function closeRnModal() {
      document.getElementById('rnModal').hidden = true;
      document.body.style.overflow = '';
    }

    // Card click delegation
    document.getElementById('rightNowCards').addEventListener('click', e => {
      const card = e.target.closest('[data-rn-index]');
      if (card) openRnModal(parseInt(card.dataset.rnIndex, 10));
    });
    document.getElementById('rightNowCards').addEventListener('keydown', e => {
      if (e.key === 'Enter' || e.key === ' ') {
        const card = e.target.closest('[data-rn-index]');
        if (card) { e.preventDefault(); openRnModal(parseInt(card.dataset.rnIndex, 10)); }
      }
    });

    // Modal close
    document.getElementById('rnModalClose').addEventListener('click', closeRnModal);
    document.getElementById('rnModal').addEventListener('click', e => {
      if (e.target === e.currentTarget) closeRnModal();
    });
    document.addEventListener('keydown', e => {
      if (e.key === 'Escape') closeRnModal();
    });

    // Refresh button
    document.getElementById('rightNowRefresh').addEventListener('click', loadRightNow);

    // Fire on page load — non-blocking
    setTimeout(loadRightNow, 0);

    /* ── Helpers ── */
    function escHtml(str) {
      return String(str).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
    }
    function escAttr(str) {
      return String(str).replace(/&/g,'&amp;').replace(/"/g,'&quot;').replace(/'/g,'&#39;');
    }
  </script>

  <!-- Right Now modal — fixed overlay, outside page-inner -->
  <div id="rnModal" class="rn-modal-overlay" hidden>
    <div class="rn-modal-box">
      <button class="rn-modal-close" id="rnModalClose" aria-label="Close">×</button>
      <div class="rn-modal-content"></div>
    </div>
  </div>

  <script defer src="/_vercel/insights/script.js"></script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Watchpal — Find something worth watching</title>
  <meta name="description" content="Describe your mood and Watchpal finds the perfect film or show for you." />
  <meta property="og:title" content="Watchpal" />
  <meta property="og:description" content="AI-powered film and show recommendations based on your mood." />
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital@1&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    [hidden] { display: none !important; }

    :root {
      --bg:           #F7F5F1;
      --surface:      #EEEAE3;
      --surface-card: #FFFFFF;
      --border:       #E0DBD3;
      --border-light: #D0C9BF;
      --accent:       #C4622D;
      --accent-hover: #A8501F;
      --accent-dim:   rgba(196, 98, 45, 0.08);
      --text:         #1C1C1E;
      --text-dim:     #6B6B6B;
      --muted:        #9B9590;
      --star:         #D4A843;
      --shadow-sm:    0 1px 3px rgba(0,0,0,0.07), 0 1px 2px rgba(0,0,0,0.04);
      --shadow-md:    0 4px 12px rgba(0,0,0,0.08), 0 1px 3px rgba(0,0,0,0.05);
      --shadow-lg:    0 8px 24px rgba(0,0,0,0.10), 0 2px 6px rgba(0,0,0,0.05);
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Inter', system-ui, -apple-system, sans-serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      -webkit-font-smoothing: antialiased;
    }

    .page-inner {
      width: 100%;
      max-width: 680px;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 3rem 1.25rem 6rem;
    }

    /* ─── WORDMARK ─── */
    .wordmark {
      align-self: flex-start;
      font-size: 1rem;
      font-weight: 700;
      color: var(--text);
      letter-spacing: -0.02em;
      margin-bottom: 3.5rem;
      display: flex;
      align-items: center;
      gap: 0.3rem;
    }
    .wordmark-dot { width: 6px; height: 6px; border-radius: 50%; background: var(--accent); }

    /* ─── WELCOME BACK ─── */
    .welcome-back {
      align-self: flex-start;
      font-size: 0.75rem;
      font-weight: 500;
      color: var(--muted);
      margin-bottom: 3rem;
      margin-top: -3rem;
    }
    .welcome-back span { color: var(--accent); font-weight: 600; }

    /* ─── SEARCH FULL ─── */
    #searchFull {
      width: 100%;
      display: flex;
      flex-direction: column;
      align-items: center;
      transition: opacity 0.28s ease, transform 0.28s ease;
    }
    #searchFull.fading-out { opacity: 0; transform: translateY(-10px); pointer-events: none; }
    @keyframes fadeInDown {
      from { opacity: 0; transform: translateY(-10px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    #searchFull.fading-in { animation: fadeInDown 0.32s ease both; }

    /* ─── HEADER ─── */
    header {
      text-align: center;
      width: 100%;
      margin-bottom: 2rem;
    }
    .eyebrow {
      font-size: 0.7rem;
      font-weight: 600;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--accent);
      margin-bottom: 1.1rem;
    }
    h1 {
      font-family: 'Inter', system-ui, sans-serif;
      font-size: clamp(2rem, 5vw, 3rem);
      font-weight: 600;
      line-height: 1.12;
      color: var(--text);
      letter-spacing: -0.03em;
      margin-bottom: 0.85rem;
    }
    h1 .playfair {
      font-family: 'Playfair Display', Georgia, serif;
      font-style: italic;
      font-weight: 400;
      color: var(--accent);
    }
    .subtitle {
      color: var(--text-dim);
      font-size: 0.95rem;
      line-height: 1.65;
    }
    .divider { width: 32px; height: 2px; background: var(--accent); margin: 1.25rem auto 0; border-radius: 2px; opacity: 0.35; }

    /* ─── SEARCH CARD ─── */
    .search-card {
      background: var(--surface-card);
      border: 1px solid var(--border);
      border-radius: 18px;
      width: 100%;
      overflow: hidden;
      box-shadow: var(--shadow-md);
    }
    .card-body { padding: 1.5rem 1.75rem 1.1rem; }

    label {
      display: block;
      font-size: 0.68rem;
      font-weight: 600;
      color: var(--muted);
      margin-bottom: 0.6rem;
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }

    .input-wrap { position: relative; min-height: 88px; }
    textarea {
      width: 100%;
      min-height: 88px;
      background: transparent;
      border: none;
      color: var(--text);
      font-family: inherit;
      font-size: 1rem;
      line-height: 1.65;
      resize: none;
      outline: none;
      position: relative;
      z-index: 1;
    }
    textarea::placeholder { color: transparent; }

    .ph-overlay {
      position: absolute;
      top: 0; left: 0; right: 0;
      color: var(--muted);
      font-style: italic;
      font-size: 1rem;
      line-height: 1.65;
      pointer-events: none;
      transition: opacity 0.45s ease;
      z-index: 0;
    }
    .ph-overlay.fading { opacity: 0; }

    /* ─── REFINEMENT ROW ─── */
    .refinement-row {
      border-top: 1px solid var(--border);
      padding: 0.9rem 1.75rem;
      background: var(--bg);
      display: flex;
      flex-direction: column;
      gap: 0.65rem;
      animation: refineIn 0.2s ease both;
    }
    @keyframes refineIn {
      from { opacity: 0; transform: translateY(-4px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    .refinement-group {
      display: flex;
      align-items: center;
      gap: 0.6rem;
      flex-wrap: wrap;
    }
    .refinement-label {
      font-size: 0.65rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: var(--muted);
      width: 56px;
      flex-shrink: 0;
    }
    .refinement-pills { display: flex; gap: 0.3rem; flex-wrap: wrap; }
    .r-pill {
      font-family: inherit;
      font-size: 0.73rem;
      font-weight: 500;
      padding: 0.2rem 0.6rem;
      border-radius: 100px;
      border: 1px solid var(--border-light);
      background: var(--surface-card);
      color: var(--text-dim);
      cursor: pointer;
      transition: all 0.12s;
      white-space: nowrap;
    }
    .r-pill:hover:not(.active) { border-color: var(--accent); color: var(--accent); }
    .r-pill.active { background: var(--accent); border-color: var(--accent); color: #fff; font-weight: 600; }

    /* ─── CARD FOOTER ─── */
    .card-footer {
      border-top: 1px solid var(--border);
      padding: 0.9rem 1.75rem;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 1rem;
    }
    .footer-hint { font-size: 0.75rem; color: var(--muted); }

    button[type="submit"] {
      flex-shrink: 0;
      padding: 0.6rem 1.4rem;
      background: var(--accent);
      color: #fff;
      font-family: inherit;
      font-size: 0.88rem;
      font-weight: 600;
      border: none;
      border-radius: 10px;
      cursor: pointer;
      transition: background 0.15s, transform 0.1s, box-shadow 0.15s;
      box-shadow: 0 2px 8px rgba(196, 98, 45, 0.28);
    }
    button[type="submit"]:hover   { background: var(--accent-hover); box-shadow: 0 4px 16px rgba(196, 98, 45, 0.35); }
    button[type="submit"]:active  { transform: scale(0.97); }
    button[type="submit"]:disabled { opacity: 0.45; cursor: not-allowed; transform: none; box-shadow: none; }

    /* ─── MOOD CHIPS ─── */
    .mood-chips-wrap {
      width: 100%;
      margin-top: 0.9rem;
    }
    .chips-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 0.5rem;
    }
    .mood-chips-label {
      font-size: 0.65rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: var(--muted);
    }
    .clear-history-btn {
      font-family: inherit;
      font-size: 0.68rem;
      color: var(--muted);
      background: none;
      border: none;
      cursor: pointer;
      padding: 0;
      text-decoration: underline;
      text-underline-offset: 2px;
      transition: color 0.15s;
    }
    .clear-history-btn:hover { color: var(--accent); }

    .mood-chips-row { display: flex; gap: 0.35rem; overflow-x: auto; scrollbar-width: none; }
    .mood-chips-row::-webkit-scrollbar { display: none; }
    .mood-chip {
      flex-shrink: 0;
      font-family: inherit;
      font-size: 0.78rem;
      font-weight: 500;
      padding: 0.35rem 0.85rem;
      border-radius: 100px;
      border: 1px solid var(--border-light);
      background: var(--surface);
      color: var(--text);
      cursor: pointer;
      transition: border-color 0.15s, color 0.15s, transform 0.1s;
      white-space: nowrap;
    }
    .mood-chip:hover { border-color: var(--accent); color: var(--accent); }
    .mood-chip:active { transform: scale(0.95); }

    /* ─── COMPACT BAR ─── */
    .compact-bar {
      width: 100%;
      background: var(--surface-card);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 0.7rem 1.1rem;
      display: flex;
      align-items: center;
      gap: 0.8rem;
      margin-bottom: 1.75rem;
      box-shadow: var(--shadow-sm);
      animation: slideDown 0.28s cubic-bezier(0.4, 0, 0.2, 1) both;
    }
    @keyframes slideDown {
      from { opacity: 0; transform: translateY(-5px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    .compact-query { flex: 1; min-width: 0; font-size: 0.85rem; color: var(--text-dim); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .compact-edit-btn {
      flex-shrink: 0;
      background: none;
      border: 1px solid var(--border-light);
      color: var(--text-dim);
      font-family: inherit;
      font-size: 0.72rem;
      font-weight: 500;
      padding: 0.28rem 0.7rem;
      border-radius: 6px;
      cursor: pointer;
      transition: border-color 0.15s, color 0.15s;
    }
    .compact-edit-btn:hover { border-color: var(--accent); color: var(--accent); }

    /* ─── RESULTS ─── */
    #results { width: 100%; }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(6px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .results-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 1rem;
    }
    .results-count { font-size: 0.85rem; color: var(--text-dim); }
    .results-count strong { color: var(--accent); font-weight: 600; }

    /* ─── RESULT CARDS (list only) ─── */
    .cards-list {
      display: flex;
      flex-direction: column;
      gap: 0.65rem;
    }

    .show-card {
      background: var(--surface-card);
      border: 1px solid var(--border);
      border-radius: 14px;
      display: flex;
      flex-direction: row;
      overflow: hidden;
      transition: box-shadow 0.2s, border-color 0.2s;
      animation: fadeUp 0.35s ease both;
      box-shadow: var(--shadow-sm);
    }
    .show-card:hover { box-shadow: var(--shadow-md); border-color: var(--border-light); }
    .show-card:nth-child(2) { animation-delay: 0.05s; }
    .show-card:nth-child(3) { animation-delay: 0.10s; }
    .show-card:nth-child(4) { animation-delay: 0.15s; }
    .show-card:nth-child(5) { animation-delay: 0.20s; }

    /* Poster */
    .card-poster {
      width: 72px;
      flex-shrink: 0;
      align-self: stretch;
      position: relative;
      background: var(--surface);
      overflow: hidden;
    }
    .card-poster img {
      position: absolute; inset: 0;
      width: 100%; height: 100%;
      object-fit: cover;
      z-index: 1;
    }
    .card-poster.no-img img { display: none; }
    .poster-placeholder {
      position: absolute; inset: 0;
      display: flex; align-items: center; justify-content: center;
      background: linear-gradient(150deg, #EEEAE3 0%, #E4DDD3 100%);
    }
    .ph-num {
      font-family: 'Playfair Display', Georgia, serif;
      font-style: italic;
      font-size: 1.5rem;
      color: var(--border-light);
      font-weight: 400;
    }

    /* Card info */
    .card-info {
      flex: 1;
      padding: 0.9rem 1rem 0.75rem 1rem;
      display: flex;
      flex-direction: column;
      gap: 0.22rem;
      min-width: 0;
    }

    /* Badges row */
    .card-badges {
      display: flex;
      align-items: center;
      gap: 0.3rem;
      flex-wrap: wrap;
      margin-bottom: 0.1rem;
    }
    .format-badge {
      font-size: 0.62rem;
      font-weight: 600;
      letter-spacing: 0.05em;
      text-transform: uppercase;
      padding: 0.1rem 0.4rem;
      border-radius: 4px;
      border: 1px solid var(--border-light);
      color: var(--text-dim);
      background: var(--surface);
      white-space: nowrap;
    }
    .lang-badge {
      font-size: 0.62rem;
      font-weight: 600;
      letter-spacing: 0.05em;
      text-transform: uppercase;
      padding: 0.1rem 0.4rem;
      border-radius: 4px;
      border: 1px solid rgba(196, 98, 45, 0.22);
      color: var(--accent);
      background: var(--accent-dim);
      white-space: nowrap;
    }
    .rating-badge {
      margin-left: auto;
      font-size: 0.68rem;
      font-weight: 600;
      color: #8a6414;
      background: rgba(212, 168, 67, 0.1);
      border: 1px solid rgba(212, 168, 67, 0.25);
      padding: 0.1rem 0.4rem;
      border-radius: 4px;
      white-space: nowrap;
      flex-shrink: 0;
    }

    /* Title + year */
    .card-title-row { display: flex; align-items: baseline; gap: 0.45rem; flex-wrap: wrap; }
    .show-title { font-weight: 600; font-size: 0.9rem; color: var(--text); line-height: 1.3; }
    .show-year  { font-size: 0.72rem; color: var(--muted); flex-shrink: 0; }

    /* Runtime */
    .show-runtime { font-size: 0.72rem; color: var(--muted); }

    /* Description */
    .show-reason {
      font-size: 0.8rem;
      color: var(--text-dim);
      line-height: 1.5;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }

    /* Where to watch */
    .watch-link {
      display: inline-flex;
      align-items: center;
      gap: 0.3rem;
      font-size: 0.73rem;
      font-weight: 500;
      color: var(--accent);
      text-decoration: none;
      margin-top: 0.15rem;
      width: fit-content;
      transition: opacity 0.15s;
    }
    .watch-link:hover { opacity: 0.75; }
    .watch-link svg { flex-shrink: 0; }

    /* ─── RESULTS FOOTER ─── */
    .results-footer {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-top: 1.5rem;
      padding-top: 1.25rem;
      border-top: 1px solid var(--border);
      gap: 1rem;
    }
    .show-more-btn {
      font-family: inherit;
      font-size: 0.84rem;
      font-weight: 600;
      color: var(--accent);
      background: none;
      border: 1.5px solid var(--accent);
      border-radius: 10px;
      padding: 0.52rem 1.1rem;
      cursor: pointer;
      transition: background 0.15s, color 0.15s;
    }
    .show-more-btn:hover { background: var(--accent); color: #fff; }
    .show-more-btn:disabled { opacity: 0.45; cursor: not-allowed; }

    .refine-btn {
      font-family: inherit;
      font-size: 0.78rem;
      color: var(--text-dim);
      background: none;
      border: none;
      cursor: pointer;
      text-decoration: underline;
      text-underline-offset: 2px;
      transition: color 0.15s;
      padding: 0;
    }
    .refine-btn:hover { color: var(--accent); }

    /* ─── SPINNER / ERROR ─── */
    .spinner {
      display: flex; align-items: center; justify-content: center;
      gap: 0.6rem; color: var(--text-dim); font-size: 0.88rem; padding: 3.5rem 0;
    }
    .spinner-ring {
      width: 16px; height: 16px;
      border: 2px solid var(--border-light);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin 0.75s linear infinite;
      flex-shrink: 0;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    .error-msg {
      color: #C0392B;
      font-size: 0.85rem;
      padding: 1rem 1.25rem;
      background: rgba(192, 57, 43, 0.05);
      border: 1px solid rgba(192, 57, 43, 0.15);
      border-radius: 12px;
      animation: fadeUp 0.3s ease;
    }

    /* ─── EMPTY STATE ─── */
    .empty-state { text-align: center; padding: 3rem 1rem; animation: fadeUp 0.4s ease both; }
    .empty-icon  { font-size: 2rem; margin-bottom: 0.75rem; }
    .empty-text  { font-size: 0.92rem; color: var(--text-dim); line-height: 1.6; margin-bottom: 1.25rem; }
    .empty-chips { display: flex; gap: 0.35rem; justify-content: center; flex-wrap: wrap; }
    .empty-chip  {
      font-family: inherit; font-size: 0.78rem; font-weight: 500;
      padding: 0.35rem 0.9rem; border-radius: 100px;
      border: 1px solid var(--border-light); background: var(--surface);
      color: var(--text); cursor: pointer; transition: border-color 0.15s, color 0.15s;
    }
    .empty-chip:hover { border-color: var(--accent); color: var(--accent); }
  </style>
</head>
<body>

  <div class="page-inner">

    <!-- Wordmark -->
    <div class="wordmark">
      <span class="wordmark-dot"></span>
      Watchpal
    </div>

    <!-- Return user greeting -->
    <div id="welcomeBack" class="welcome-back" hidden>
      Welcome back — <span>picks based on your history</span>
    </div>

    <!-- Full search section -->
    <div id="searchFull">
      <header>
        <p class="eyebrow">AI-powered discovery</p>
        <h1>What do you feel like<br><span class="playfair">watching?</span></h1>
        <p class="subtitle">Describe your mood, the vibe you're after, or a story you're craving.</p>
        <div class="divider"></div>
      </header>

      <div class="search-card">
        <form id="moodForm">
          <div class="card-body">
            <label for="mood">Your mood or craving</label>
            <div class="input-wrap">
              <textarea id="mood" name="mood" required></textarea>
              <div class="ph-overlay" id="phOverlay"></div>
            </div>
          </div>

          <!-- Refinement row — shown on focus -->
          <div id="refinementRow" class="refinement-row" hidden>
            <div class="refinement-group">
              <span class="refinement-label">Format</span>
              <div class="refinement-pills">
                <button class="r-pill active" type="button" data-group="format" data-value="all">All</button>
                <button class="r-pill"        type="button" data-group="format" data-value="movie">Movie</button>
                <button class="r-pill"        type="button" data-group="format" data-value="series">Series</button>
                <button class="r-pill"        type="button" data-group="format" data-value="documentary">Documentary</button>
              </div>
            </div>
            <div class="refinement-group">
              <span class="refinement-label">Language</span>
              <div class="refinement-pills">
                <button class="r-pill active" type="button" data-group="language" data-value="any">Any</button>
                <button class="r-pill"        type="button" data-group="language" data-value="english">English</button>
                <button class="r-pill"        type="button" data-group="language" data-value="tamil">Tamil</button>
                <button class="r-pill"        type="button" data-group="language" data-value="korean">Korean</button>
                <button class="r-pill"        type="button" data-group="language" data-value="hindi">Hindi</button>
                <button class="r-pill"        type="button" data-group="language" data-value="other">Other</button>
              </div>
            </div>
            <div class="refinement-group">
              <span class="refinement-label">Length</span>
              <div class="refinement-pills">
                <button class="r-pill active" type="button" data-group="length" data-value="any">Any</button>
                <button class="r-pill"        type="button" data-group="length" data-value="short">Under 2hrs</button>
                <button class="r-pill"        type="button" data-group="length" data-value="long">2hrs+</button>
                <button class="r-pill"        type="button" data-group="length" data-value="mini">Mini-series</button>
              </div>
            </div>
          </div>

          <div class="card-footer">
            <span class="footer-hint">Enter to search · Shift+Enter for new line</span>
            <button type="submit" id="submitBtn">Discover →</button>
          </div>
        </form>
      </div>

      <!-- Mood chips — below the input card, populated by JS -->
      <div class="mood-chips-wrap">
        <div class="chips-header">
          <div class="mood-chips-label" id="chipsLabel">Quick picks</div>
          <button class="clear-history-btn" id="clearHistoryBtn" hidden>Clear history</button>
        </div>
        <div class="mood-chips-row" id="moodChipsRow"></div>
      </div>
    </div>

    <!-- Compact bar shown after search -->
    <div id="compactBar" class="compact-bar" hidden>
      <div id="compactQueryText" class="compact-query"></div>
      <button id="newSearchBtn" class="compact-edit-btn">Edit</button>
    </div>

    <!-- Results -->
    <section id="results" hidden></section>

  </div>

  <script>
    /* ── DOM refs ── */
    const form             = document.getElementById('moodForm');
    const resultsEl        = document.getElementById('results');
    const submitBtn        = document.getElementById('submitBtn');
    const searchFull       = document.getElementById('searchFull');
    const compactBar       = document.getElementById('compactBar');
    const compactQueryText = document.getElementById('compactQueryText');
    const newSearchBtn     = document.getElementById('newSearchBtn');
    const moodInput        = document.getElementById('mood');
    const phOverlay        = document.getElementById('phOverlay');
    const refinementRow    = document.getElementById('refinementRow');

    /* ── State ── */
    let allShows      = [];
    let currentMood   = '';
    let shownTitles   = [];
    let refinements   = { format: 'all', language: 'any', length: 'any' };

    /* ── localStorage history ── */
    const HISTORY_KEY = 'watchpal_history';
    const MAX_HISTORY = 10;

    function getHistory() {
      try { return JSON.parse(localStorage.getItem(HISTORY_KEY) || '[]'); }
      catch { return []; }
    }
    function saveToHistory(query) {
      const h = getHistory().filter(e => e.query.toLowerCase() !== query.toLowerCase());
      h.unshift({ query, timestamp: Date.now() });
      localStorage.setItem(HISTORY_KEY, JSON.stringify(h.slice(0, MAX_HISTORY)));
    }
    function clearHistory() { localStorage.removeItem(HISTORY_KEY); }

    /* ── Chips ── */
    const DEFAULT_CHIPS = [
      'Something to cry to','Friday night energy','Impress a date',
      'Tamil classics','Mind-bending sci-fi','Cozy Sunday',
      'Late night alone','Feel good','Edge of your seat',
    ];

    function renderChips() {
      const history   = getHistory();
      const label     = document.getElementById('chipsLabel');
      const row       = document.getElementById('moodChipsRow');
      const clearBtn  = document.getElementById('clearHistoryBtn');
      const welcomeEl = document.getElementById('welcomeBack');

      if (history.length > 0) {
        label.textContent    = 'YOUR PICKS';
        clearBtn.hidden      = false;
        welcomeEl.hidden     = false;
        row.innerHTML        = history.slice(0, 5)
          .map(e => `<button class="mood-chip" type="button">${escHtml(e.query)}</button>`)
          .join('');
      } else {
        label.textContent    = 'QUICK PICKS';
        clearBtn.hidden      = true;
        welcomeEl.hidden     = true;
        row.innerHTML        = DEFAULT_CHIPS
          .map(c => `<button class="mood-chip" type="button">${c}</button>`)
          .join('');
      }
      row.onclick = e => {
        const chip = e.target.closest('.mood-chip');
        if (chip) submitMood(chip.textContent.trim());
      };
    }

    document.getElementById('clearHistoryBtn').addEventListener('click', () => {
      clearHistory();
      renderChips();
    });

    renderChips();

    /* ── Rotating placeholder ── */
    const PLACEHOLDERS = [
      'I want something slow and unsettling…',
      'Friday night, something funny but not stupid',
      'A film that feels like rain',
      'Something my mum would love',
      'Tamil cinema that changed how I see the world',
      "A story I won't stop thinking about",
    ];
    let phIndex = 0, phTimer = null;

    function cyclePlaceholder() {
      phOverlay.classList.add('fading');
      setTimeout(() => {
        phIndex = (phIndex + 1) % PLACEHOLDERS.length;
        phOverlay.textContent = PLACEHOLDERS[phIndex];
        phOverlay.classList.remove('fading');
      }, 450);
    }
    function startPlaceholder() {
      phOverlay.textContent = PLACEHOLDERS[phIndex];
      phOverlay.style.display = '';
      clearInterval(phTimer);
      phTimer = setInterval(cyclePlaceholder, 3000);
    }
    function stopPlaceholder() {
      clearInterval(phTimer); phTimer = null;
      phOverlay.style.display = 'none';
    }

    moodInput.addEventListener('input', () => {
      moodInput.value ? stopPlaceholder() : startPlaceholder();
    });
    startPlaceholder();

    /* ── Show refinements on focus ── */
    moodInput.addEventListener('focus', () => {
      refinementRow.hidden = false;
    });

    /* ── Refinement pill toggles ── */
    refinementRow.addEventListener('click', e => {
      const pill = e.target.closest('.r-pill');
      if (!pill) return;
      const group = pill.dataset.group;
      const value = pill.dataset.value;
      refinements[group] = value;
      refinementRow.querySelectorAll(`.r-pill[data-group="${group}"]`).forEach(p => p.classList.remove('active'));
      pill.classList.add('active');
    });

    /* ── Enter key submits; Shift+Enter = newline ── */
    moodInput.addEventListener('keydown', e => {
      if (e.key === 'Enter' && !e.shiftKey) {
        e.preventDefault();
        if (!submitBtn.disabled && moodInput.value.trim()) {
          form.dispatchEvent(new Event('submit', { bubbles: true, cancelable: true }));
        }
      }
    });

    /* ── Chip submit ── */
    function submitMood(text) {
      moodInput.value = text;
      stopPlaceholder();
      refinementRow.hidden = false;
      setTimeout(() => form.dispatchEvent(new Event('submit', { bubbles: true, cancelable: true })), 60);
    }

    /* ── Collapse / expand ── */
    function collapseSearch(moodText) {
      compactQueryText.textContent = moodText;
      searchFull.classList.add('fading-out');
      setTimeout(() => {
        searchFull.hidden = true;
        searchFull.classList.remove('fading-out');
        compactBar.hidden = false;
      }, 280);
    }

    function expandSearch(openRefinements = false) {
      compactBar.hidden = true;
      resultsEl.hidden  = true;
      resultsEl.innerHTML = '';
      allShows     = [];
      shownTitles  = [];
      searchFull.hidden = false;
      searchFull.classList.add('fading-in');
      renderChips();
      setTimeout(() => {
        searchFull.classList.remove('fading-in');
        moodInput.focus();
        if (!moodInput.value) startPlaceholder();
        if (openRefinements) refinementRow.hidden = false;
      }, 340);
    }

    newSearchBtn.addEventListener('click', () => expandSearch());

    /* ── Fetch helper ── */
    async function fetchRecommendations(mood, exclude = []) {
      const recentHistory = getHistory().slice(1, 4).map(h => h.query);
      const res = await fetch('/api/recommend', {
        method:  'POST',
        headers: { 'Content-Type': 'application/json' },
        body:    JSON.stringify({ mood, refinements, exclude, history: recentHistory }),
      });
      if (!res.ok) throw new Error(`Server error: ${res.status}`);
      const data = await res.json();
      return data.recommendations ?? [];
    }

    /* ── Form submit ── */
    form.addEventListener('submit', async e => {
      e.preventDefault();
      const mood = moodInput.value.trim();
      if (!mood) return;

      currentMood = mood;
      allShows    = [];
      shownTitles = [];

      submitBtn.disabled   = true;
      submitBtn.textContent = 'Thinking…';
      resultsEl.hidden      = false;
      resultsEl.innerHTML   = `
        <div class="spinner">
          <div class="spinner-ring"></div>
          Finding films &amp; shows for your mood…
        </div>`;

      saveToHistory(mood);
      collapseSearch(mood);

      try {
        const results = await fetchRecommendations(mood);
        allShows    = results;
        shownTitles = results.map(s => s.title);
        renderResults();
      } catch (err) {
        resultsEl.innerHTML = `<div class="error-msg">Something went wrong: ${err.message}</div>`;
      } finally {
        submitBtn.disabled    = false;
        submitBtn.textContent = 'Discover →';
      }
    });

    /* ── Show more ── */
    async function loadMore() {
      const btn = document.getElementById('showMoreBtn');
      if (!btn) return;
      btn.disabled    = true;
      btn.textContent = 'Loading…';

      try {
        const more = await fetchRecommendations(currentMood, shownTitles);
        allShows    = [...allShows, ...more];
        shownTitles = allShows.map(s => s.title);
        renderResults();
      } catch (err) {
        btn.disabled    = false;
        btn.textContent = 'Show more like this →';
      }
    }

    /* ── Render results ── */
    function countLabel(n) {
      if (n === 1) return 'Found <strong>1</strong> title for you';
      return `Found <strong>${n}</strong> films &amp; shows for you`;
    }

    function renderResults() {
      if (!allShows.length) {
        resultsEl.innerHTML = `
          <div class="empty-state">
            <div class="empty-icon">🎬</div>
            <p class="empty-text">Nothing matched — try describing a mood or feeling instead.</p>
            <div class="empty-chips">
              <button class="empty-chip">Feel good</button>
              <button class="empty-chip">Edge of your seat</button>
              <button class="empty-chip">Cozy Sunday</button>
            </div>
          </div>`;
        resultsEl.querySelector('.empty-chips').addEventListener('click', e => {
          const chip = e.target.closest('.empty-chip');
          if (chip) { expandSearch(); setTimeout(() => submitMood(chip.textContent.trim()), 400); }
        });
        return;
      }

      resultsEl.innerHTML = `
        <div class="results-header">
          <span class="results-count">${countLabel(allShows.length)}</span>
        </div>
        <div class="cards-list">
          ${allShows.map((s, i) => renderCard(s, i)).join('')}
        </div>
        <div class="results-footer">
          <button class="show-more-btn" id="showMoreBtn">Show more like this →</button>
          <button class="refine-btn"   id="refineBtn">Refine search ↑</button>
        </div>`;

      document.getElementById('showMoreBtn').addEventListener('click', loadMore);
      document.getElementById('refineBtn').addEventListener('click', () => expandSearch(true));
    }

    /* ── Render card ── */
    function renderCard(s, i) {
      const hasPoster = !!s.poster;
      const isNonEnglish = s.language && s.language.toLowerCase() !== 'english';
      const watchUrl = `https://www.google.com/search?q=watch+${encodeURIComponent(s.title)}+streaming+Australia`;

      return `
        <div class="show-card">
          <div class="card-poster${hasPoster ? '' : ' no-img'}">
            <div class="poster-placeholder"><span class="ph-num">${i + 1}</span></div>
            ${hasPoster ? `<img src="${escAttr(s.poster)}" alt="${escAttr(s.title ?? '')}" loading="lazy" onerror="this.closest('.card-poster').classList.add('no-img')">` : ''}
          </div>
          <div class="card-info">
            <div class="card-badges">
              ${s.format     ? `<span class="format-badge">${escHtml(s.format)}</span>` : ''}
              ${isNonEnglish ? `<span class="lang-badge">${escHtml(s.language)}</span>` : ''}
              ${s.imdbRating ? `<span class="rating-badge">★ ${escHtml(s.imdbRating)}</span>` : ''}
            </div>
            <div class="card-title-row">
              <span class="show-title">${escHtml(s.title ?? 'Untitled')}</span>
              ${s.year ? `<span class="show-year">${escHtml(s.year)}</span>` : ''}
            </div>
            ${s.runtime ? `<span class="show-runtime">${escHtml(s.runtime)}</span>` : ''}
            ${s.reason  ? `<p class="show-reason">${escHtml(s.reason)}</p>` : ''}
            <a class="watch-link" href="${escAttr(watchUrl)}" target="_blank" rel="noopener noreferrer">
              <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                <circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/>
              </svg>
              Where to watch
            </a>
          </div>
        </div>`;
    }

    /* ── Helpers ── */
    function escHtml(str) {
      return String(str).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
    }
    function escAttr(str) {
      return String(str).replace(/&/g,'&amp;').replace(/"/g,'&quot;').replace(/'/g,'&#39;');
    }
  </script>

  <script defer src="/_vercel/insights/script.js"></script>
</body>
</html>
